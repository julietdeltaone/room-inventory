<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Audit — Room Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #111113;
  --s1:       #18181b;
  --s2:       #1e1e22;
  --s3:       #242428;
  --s4:       #2a2a2f;
  --border:   #2c2c31;
  --border2:  #383840;
  --rose:     #b07a84;
  --rose-dim: rgba(176,122,132,0.14);
  --steel:    #6e8fa8;
  --steel-dim:rgba(110,143,168,0.12);
  --text:     #e8e8ea;
  --text-mid: #909098;
  --text-dim: #565660;
  --green:    #4d8f6a;
  --red:      #8f4848;
  --amber:    #9e7a32;
  --radius:   6px;
  --font-mono: 'DM Mono', monospace;
  --font-sans: 'Inter', system-ui, sans-serif;

  --audit-q:   #6e8fa8;
  --audit-ba:  #9e7a32;
  --audit-a:   #7a6ea8;
  --audit-never: #565660;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font-sans); font-size: 13px; min-height: 100vh; -webkit-font-smoothing: antialiased; }
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── HEADER ── */
header {
  height: 46px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px; border-bottom: 1px solid var(--border);
  background: var(--bg); position: sticky; top: 0; z-index: 200; gap: 12px;
}
.logo { font-family: var(--font-mono); font-size: 11px; font-weight: 500; letter-spacing: 0.22em; color: var(--rose); text-transform: uppercase; white-space: nowrap; }
.header-right { display: flex; align-items: center; gap: 6px; }

/* ── BUTTONS ── */
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: var(--radius); font-family: var(--font-sans); font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid; transition: all 0.13s; white-space: nowrap; }
.btn-ghost { background: transparent; color: var(--text-mid); border-color: var(--border2); }
.btn-ghost:hover { border-color: var(--text-mid); color: var(--text); }
.btn-primary { background: var(--rose); color: #fff; border-color: var(--rose); }
.btn-primary:hover { background: #c97882; border-color: #c97882; }
.btn-green { background: transparent; color: var(--green); border-color: rgba(77,143,106,0.35); }
.btn-green:hover { background: rgba(77,143,106,0.12); }
.btn-sm { padding: 3px 9px; font-size: 11px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── LAYOUT ── */
.app { display: grid; grid-template-columns: 300px 1fr; min-height: calc(100vh - 46px); }

/* ── QUEUE PANEL ── */
.queue-panel {
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: sticky; top: 46px; height: calc(100vh - 46px); overflow: hidden;
}
.queue-header {
  padding: 14px 14px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.queue-title { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-mid); margin-bottom: 10px; }
.progress-track { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 8px; }
.progress-fill { height: 100%; background: var(--rose); border-radius: 2px; transition: width 0.4s; }
.progress-labels { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); }
.progress-labels span:first-child { color: var(--rose); }

.queue-filters { display: flex; gap: 4px; margin-top: 10px; flex-wrap: wrap; }
.qf-btn { font-family: var(--font-mono); font-size: 9px; padding: 2px 7px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; color: var(--text-dim); cursor: pointer; transition: all 0.13s; }
.qf-btn.active { border-color: var(--rose); color: var(--rose); background: var(--rose-dim); }

.queue-list { flex: 1; overflow-y: auto; padding: 6px 0; }

.queue-item {
  padding: 9px 14px; cursor: pointer; border-left: 3px solid transparent;
  transition: background 0.1s, border-color 0.1s;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.queue-item:hover { background: var(--s2); }
.queue-item.active { background: var(--s2); border-left-color: var(--rose); }
.queue-item.done { opacity: 0.45; }

.qi-status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.qi-status-dot.unreviewed { background: var(--text-dim); }
.qi-status-dot.incomplete  { background: var(--amber); }
.qi-status-dot.clean       { background: var(--green); }

.qi-info { flex: 1; min-width: 0; }
.qi-name { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
.qi-sub  { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.qi-freq { flex-shrink: 0; }

.freq-pip { display: inline-block; padding: 1px 5px; border-radius: 20px; font-family: var(--font-mono); font-size: 8px; font-weight: 500; border: 1px solid; }
.freq-q    { color: var(--audit-q);     border-color: rgba(110,143,168,0.4); background: rgba(110,143,168,0.08); }
.freq-ba   { color: var(--audit-ba);    border-color: rgba(158,122,50,0.4);  background: rgba(158,122,50,0.08); }
.freq-a    { color: var(--audit-a);     border-color: rgba(122,110,168,0.4); background: rgba(122,110,168,0.08); }
.freq-never{ color: var(--audit-never); border-color: var(--border);         background: transparent; }

.queue-batch-footer {
  padding: 10px 14px; border-top: 1px solid var(--border); flex-shrink: 0;
  display: flex; gap: 6px; align-items: center;
}

/* ── EDIT PANEL ── */
.edit-panel { padding: 20px 24px; overflow-y: auto; }

.edit-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: calc(100vh - 100px); gap: 8px; }
.edit-empty-icon { font-size: 32px; opacity: 0.2; }
.edit-empty-text { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; }

/* Item header */
.item-header { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.item-number { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
.item-name-display { font-size: 20px; font-weight: 600; color: var(--text); line-height: 1.2; margin-bottom: 6px; }
.item-loc-display { font-family: var(--font-mono); font-size: 10px; color: var(--text-mid); }
.item-loc-display span { color: var(--text-dim); margin: 0 4px; }

/* Audit status banner */
.audit-banner {
  padding: 8px 12px; border-radius: var(--radius); margin-bottom: 18px;
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono); font-size: 10px;
}
.audit-banner.unreviewed { background: rgba(86,86,96,0.15); border: 1px solid var(--border2); color: var(--text-dim); }
.audit-banner.incomplete  { background: rgba(158,122,50,0.1); border: 1px solid rgba(158,122,50,0.3); color: var(--amber); }
.audit-banner.clean       { background: rgba(77,143,106,0.1); border: 1px solid rgba(77,143,106,0.3); color: var(--green); }
.audit-banner-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: currentColor; }

/* Missing fields */
.missing-fields { margin-bottom: 18px; }
.missing-label { font-family: var(--font-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-dim); margin-bottom: 6px; }
.missing-tags { display: flex; gap: 4px; flex-wrap: wrap; }
.missing-tag { font-family: var(--font-mono); font-size: 9px; padding: 2px 7px; border-radius: 20px; background: rgba(158,122,50,0.12); border: 1px solid rgba(158,122,50,0.3); color: var(--amber); cursor: pointer; transition: background 0.12s; }
.missing-tag:hover { background: rgba(158,122,50,0.2); }

/* Field grid */
.field-section { margin-bottom: 22px; }
.field-section-title { font-family: var(--font-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-dim); margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.field-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.field-full { grid-column: 1 / -1; }

.field-group { display: flex; flex-direction: column; gap: 4px; }
.field-label { font-family: var(--font-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); }
.field-label.required::after { content: ' *'; color: var(--rose); }
.field-label.flagged { color: var(--amber); }

.field-input, .field-select, .field-textarea {
  background: var(--s2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 5px 8px; color: var(--text); font-family: var(--font-sans); font-size: 12px;
  outline: none; transition: border-color 0.15s; width: 100%;
}
.field-input:focus, .field-select:focus, .field-textarea:focus { border-color: var(--rose); }
.field-select option { background: var(--s2); }
.field-textarea { resize: vertical; min-height: 60px; font-family: var(--font-mono); font-size: 11px; line-height: 1.5; }
.field-input.flagged, .field-select.flagged { border-color: rgba(158,122,50,0.5); background: rgba(158,122,50,0.04); }
.field-input.filled, .field-select.filled { border-color: rgba(77,143,106,0.4); }

/* Audit frequency selector */
.freq-selector { display: flex; gap: 6px; flex-wrap: wrap; }
.freq-opt {
  padding: 6px 12px; border-radius: var(--radius); border: 1px solid var(--border2);
  font-family: var(--font-mono); font-size: 10px; cursor: pointer;
  background: transparent; color: var(--text-dim); transition: all 0.13s;
  flex: 1; text-align: center; min-width: 80px;
}
.freq-opt:hover { border-color: var(--text-mid); color: var(--text); }
.freq-opt.selected-q     { border-color: var(--audit-q);  color: var(--audit-q);  background: rgba(110,143,168,0.12); }
.freq-opt.selected-ba    { border-color: var(--audit-ba); color: var(--audit-ba); background: rgba(158,122,50,0.12); }
.freq-opt.selected-a     { border-color: var(--audit-a);  color: var(--audit-a);  background: rgba(122,110,168,0.12); }
.freq-opt.selected-never { border-color: var(--border2);  color: var(--text-mid); background: var(--s2); }
.freq-required-hint { font-family: var(--font-mono); font-size: 9px; color: var(--rose); margin-top: 4px; display: none; }
.freq-required-hint.visible { display: block; }

/* Action bar */
.action-bar {
  display: flex; gap: 8px; align-items: center; margin-top: 24px;
  padding-top: 16px; border-top: 1px solid var(--border); position: sticky;
  bottom: 0; background: var(--bg); padding-bottom: 8px;
}
.action-bar-left { flex: 1; display: flex; gap: 6px; }
.skip-btn { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); background: transparent; border: none; cursor: pointer; padding: 4px 0; text-decoration: underline; text-decoration-style: dotted; }
.skip-btn:hover { color: var(--text-mid); }

/* Toast */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--s3); border: 1px solid var(--border2); border-radius: var(--radius); padding: 8px 16px; font-family: var(--font-mono); font-size: 11px; color: var(--text); opacity: 0; transition: opacity 0.2s, transform 0.2s; z-index: 9999; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Loading */
.loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: calc(100vh - 46px); gap: 12px; }
.loading-dots { display: flex; gap: 5px; }
.loading-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--rose); animation: ldot 1.2s infinite; }
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes ldot { 0%,80%,100%{opacity:0.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }
.loading-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; }

/* Stat chips in header */
.stat-chips { display: flex; gap: 8px; align-items: center; }
.stat-chip { font-family: var(--font-mono); font-size: 9px; color: var(--text-dim); display: flex; align-items: center; gap: 4px; }
.stat-chip-dot { width: 5px; height: 5px; border-radius: 50%; }
</style>
</head>
<body>

<header>
  <div class="logo">AUDIT</div>
  <div class="stat-chips" id="stat-chips"></div>
  <div class="header-right">
    <a href="index.html" class="btn btn-ghost btn-sm" style="text-decoration:none">← Editor</a>
    <a href="locate.html" class="btn btn-ghost btn-sm" style="text-decoration:none">Locate →</a>
  </div>
</header>

<div id="loading-screen" class="loading-screen">
  <div class="loading-dots"><span></span><span></span><span></span></div>
  <div class="loading-label">Loading inventory…</div>
</div>

<div class="app" id="app" style="display:none">

  <!-- QUEUE PANEL -->
  <div class="queue-panel">
    <div class="queue-header">
      <div class="queue-title">Audit Queue — Batch <span id="batch-num">1</span></div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="progress-labels">
        <span id="prog-done">0 audited</span>
        <span id="prog-total">of 0</span>
      </div>
      <div class="queue-filters">
        <button class="qf-btn active" data-filter="all" onclick="setQueueFilter('all',this)">All</button>
        <button class="qf-btn" data-filter="unreviewed" onclick="setQueueFilter('unreviewed',this)">Unreviewed</button>
        <button class="qf-btn" data-filter="incomplete" onclick="setQueueFilter('incomplete',this)">Incomplete</button>
        <button class="qf-btn" data-filter="overdue" onclick="setQueueFilter('overdue',this)">Overdue</button>
      </div>
    </div>
    <div class="queue-list" id="queue-list"></div>
    <div class="queue-batch-footer">
      <button class="btn btn-ghost btn-sm" onclick="prevBatch()" id="prev-batch-btn" disabled>← Prev</button>
      <button class="btn btn-ghost btn-sm" onclick="nextBatch()" id="next-batch-btn">Next →</button>
      <div style="flex:1"></div>
      <span style="font-family:var(--font-mono);font-size:9px;color:var(--text-dim)" id="batch-label"></span>
    </div>
  </div>

  <!-- EDIT PANEL -->
  <div class="edit-panel" id="edit-panel">
    <div class="edit-empty" id="edit-empty">
      <div class="edit-empty-icon">◈</div>
      <div class="edit-empty-text">Select an item from the queue</div>
    </div>
    <div id="edit-form" style="display:none"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ─── SUPABASE ──────────────────────────────────────────────────────────────
const SUPABASE_URL   = 'https://npdtjxjhepaqhrqtvueu.supabase.co';
const SUPABASE_KEY   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5wZHRqeGpoZXBhcWhycXR2dWV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MDM1NjYsImV4cCI6MjA5MjQ3OTU2Nn0.7a1y4wBWOJ45Wc7bwJNMJ9L09-QijuG31jWlYANKam8';
const SUPABASE_TABLE = 'inventory';

const BATCH_SIZE = 10;
const FREQ_DAYS  = { Quarterly: 90, 'Bi-Annual': 180, Annual: 365 };

// Location sort order: alphabetical top-level, then alphabetical children
// Edit this array to override top-level order; anything not listed falls alphabetically after
const LOCATION_ORDER = [];

let inventory    = [];
let queue        = [];  // full sorted queue
let batchStart   = 0;
let currentFilter = 'all';
let currentItemId = null;
let _saveTimer   = null;

// ─── INIT ──────────────────────────────────────────────────────────────────
async function init() {
  const items = await sbLoadAll();
  inventory = items;
  buildQueue();
  updateStats();

  // If opened with ?item=ID, jump to that item
  const params = new URLSearchParams(location.search);
  const focusId = params.get('item');
  if (focusId) {
    const id = parseInt(focusId);
    const idx = queue.findIndex(i => i.id === id);
    if (idx >= 0) {
      batchStart = Math.floor(idx / BATCH_SIZE) * BATCH_SIZE;
      renderQueue();
      selectItem(id);
      return;
    }
  }

  renderQueue();
  if (queue.length > 0) selectItem(queue[batchStart].id);
}

// ─── SUPABASE ──────────────────────────────────────────────────────────────
async function sbLoadAll() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}?select=*&order=id.asc`, {
    headers: {
      'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Prefer': 'return=representation'
    }
  });
  if (!res.ok) throw new Error('Load failed: ' + res.status);
  const rows = await res.json();
  return rows.map(rowToItem);
}

async function sbUpsert(item) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'resolution=merge-duplicates,return=minimal'
    },
    body: JSON.stringify([itemToRow(item)])
  });
  return res.ok;
}

function itemToRow(item) {
  return {
    id: item.id,
    name: item.name || '',
    sn: item.sn || '',
    category: item.category || '',
    location: (item.locationPath || []).join(' > '),
    doc_type: item.docType || '',
    digital_copy: item.digitalCopy ? true : false,
    fill_level: item.fillLevel || '',
    qty: item.qty || '1',
    frequency: item.frequency || '',
    criticality: item.criticality || '',
    replaceability: item.replaceability || '',
    condition: item.condition || '',
    keep: item.keep || '',
    year_purchased: item.yearPurchased || '',
    last_used: item.lastUsed || '',
    est_value: item.estValue || '',
    notes: item.notes || '',
    misplaced: item.misplaced ? true : false,
    last_modified: new Date().toISOString(),
    keywords: item.keywords || '',
    change_log: item.changeLog ? JSON.stringify(item.changeLog) : '[]',
    created_at: item.createdAt || null,
    in_use: item.inUse ? true : false,
    locked_item: item.lockedItem ? true : false,
    locked_notes: item.lockedNotes ? true : false,
    mil_sub: item.milSub || null,
    doc_url: item.docUrl || null,
    audit_freq: item.auditFreq || null,
    last_audited: item.lastAudited || null,
  };
}

function rowToItem(row) {
  return {
    id: row.id,
    name: row.name,
    sn: row.sn,
    category: row.category,
    locationPath: row.location ? row.location.split(' > ').filter(Boolean) : [],
    docType: row.doc_type,
    digitalCopy: row.digital_copy,
    fillLevel: row.fill_level,
    qty: row.qty,
    frequency: row.frequency,
    criticality: row.criticality,
    replaceability: row.replaceability,
    condition: row.condition,
    keep: row.keep,
    yearPurchased: row.year_purchased,
    lastUsed: row.last_used,
    estValue: row.est_value,
    notes: row.notes,
    misplaced: row.misplaced,
    keywords: row.keywords || '',
    changeLog: row.change_log ? (typeof row.change_log === 'string' ? JSON.parse(row.change_log) : row.change_log) : [],
    createdAt: row.created_at || null,
    lastModified: row.last_modified || null,
    inUse: row.in_use ? true : false,
    lockedItem: row.locked_item ? true : false,
    lockedNotes: row.locked_notes ? true : false,
    milSub: row.mil_sub || null,
    docUrl: row.doc_url || null,
    auditFreq: row.audit_freq || null,
    lastAudited: row.last_audited || null,
  };
}

// ─── QUEUE BUILDING ────────────────────────────────────────────────────────
function itemStatus(item) {
  if (!item.auditFreq) return 'unreviewed';
  const missing = getMissingFields(item);
  if (missing.length > 0) return 'incomplete';
  // check overdue
  if (item.auditFreq !== 'Never' && item.lastAudited) {
    const days = FREQ_DAYS[item.auditFreq];
    const due  = new Date(item.lastAudited).getTime() + days * 86400000;
    if (Date.now() > due) return 'overdue';
  }
  return 'clean';
}

function getMissingFields(item) {
  const missing = [];
  if (!item.category)       missing.push('Category');
  if (!item.criticality)    missing.push('Criticality');
  if (!item.frequency)      missing.push('Frequency');
  if (!item.condition)      missing.push('Condition');
  if (!item.keep)           missing.push('Keep');
  if (!item.replaceability) missing.push('Replaceability');
  // estValue only flagged if criticality is Essential or Important
  if (!item.estValue && (item.criticality === 'Essential' || item.criticality === 'Important')) missing.push('Est. Value');
  return missing;
}

function locSortKey(item) {
  const path = item.locationPath || [];
  if (!path.length) return 'zzz_no_location';
  const top = path[0] || '';
  const orderIdx = LOCATION_ORDER.indexOf(top);
  const topKey = orderIdx >= 0 ? String(orderIdx).padStart(4,'0') : 'zz_' + top.toLowerCase();
  const rest = path.slice(1).map(s => s.toLowerCase()).join('\0');
  return topKey + '\0' + rest;
}

function buildQueue() {
  // Sort: overdue first, then by status priority, then by location+name
  const statusPriority = { overdue: 0, incomplete: 1, unreviewed: 2, clean: 3 };
  queue = [...inventory].sort((a, b) => {
    const sa = statusPriority[itemStatus(a)];
    const sb = statusPriority[itemStatus(b)];
    if (sa !== sb) return sa - sb;
    const la = locSortKey(a);
    const lb = locSortKey(b);
    if (la !== lb) return la < lb ? -1 : 1;
    return (a.name || '').localeCompare(b.name || '');
  });
}

function filteredQueue() {
  if (currentFilter === 'all') return queue;
  if (currentFilter === 'overdue') return queue.filter(i => itemStatus(i) === 'overdue');
  return queue.filter(i => itemStatus(i) === currentFilter);
}

// ─── RENDER QUEUE ──────────────────────────────────────────────────────────
function renderQueue() {
  const fq = filteredQueue();
  const batch = fq.slice(batchStart, batchStart + BATCH_SIZE);
  const list = document.getElementById('queue-list');

  list.innerHTML = batch.map(item => {
    const status = itemStatus(item);
    const path = (item.locationPath || []).join(' › ');
    const freq = item.auditFreq;
    const freqShort = { Quarterly:'Q', 'Bi-Annual':'B/A', Annual:'A', Never:'—' };
    const freqCls   = { Quarterly:'freq-q', 'Bi-Annual':'freq-ba', Annual:'freq-a', Never:'freq-never' };
    const freqBadge = freq
      ? `<span class="freq-pip ${freqCls[freq]||''}">${freqShort[freq]||freq}</span>`
      : '';
    const dotCls = status === 'overdue' ? 'incomplete' : status; // overdue shows amber dot
    const isDone = status === 'clean';
    return `<div class="queue-item${item.id===currentItemId?' active':''}${isDone?' done':''}"
        onclick="selectItem(${item.id})">
      <div class="qi-status-dot ${dotCls}"></div>
      <div class="qi-info">
        <div class="qi-name">${esc(item.name||'—')}</div>
        <div class="qi-sub">${esc(path||'No location')}</div>
      </div>
      <div class="qi-freq">${freqBadge}</div>
    </div>`;
  }).join('');

  // batch nav
  const batchNum = Math.floor(batchStart / BATCH_SIZE) + 1;
  const totalBatches = Math.ceil(fq.length / BATCH_SIZE);
  document.getElementById('batch-num').textContent = batchNum;
  document.getElementById('batch-label').textContent = `${batchStart+1}–${Math.min(batchStart+BATCH_SIZE,fq.length)} of ${fq.length}`;
  document.getElementById('prev-batch-btn').disabled = batchStart === 0;
  document.getElementById('next-batch-btn').disabled = batchStart + BATCH_SIZE >= fq.length;

  updateStats();
}

function updateStats() {
  const total    = inventory.length;
  const audited  = inventory.filter(i => !!i.auditFreq).length;
  const pct      = total ? Math.round(audited/total*100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('prog-done').textContent = audited + ' audited';
  document.getElementById('prog-total').textContent = 'of ' + total;

  const unreviewed = inventory.filter(i => itemStatus(i)==='unreviewed').length;
  const incomplete = inventory.filter(i => itemStatus(i)==='incomplete').length;
  const overdue    = inventory.filter(i => itemStatus(i)==='overdue').length;
  const clean      = inventory.filter(i => itemStatus(i)==='clean').length;

  document.getElementById('stat-chips').innerHTML = `
    <div class="stat-chip"><div class="stat-chip-dot" style="background:var(--text-dim)"></div>${unreviewed} unreviewed</div>
    <div class="stat-chip"><div class="stat-chip-dot" style="background:var(--amber)"></div>${incomplete} incomplete</div>
    <div class="stat-chip"><div class="stat-chip-dot" style="background:var(--red)"></div>${overdue} overdue</div>
    <div class="stat-chip"><div class="stat-chip-dot" style="background:var(--green)"></div>${clean} clean</div>
  `;
}

function setQueueFilter(f, btn) {
  currentFilter = f;
  batchStart = 0;
  document.querySelectorAll('.qf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQueue();
}

function prevBatch() { batchStart = Math.max(0, batchStart - BATCH_SIZE); renderQueue(); }
function nextBatch() { const fq = filteredQueue(); batchStart = Math.min(batchStart + BATCH_SIZE, Math.floor((fq.length-1)/BATCH_SIZE)*BATCH_SIZE); renderQueue(); }

// ─── ITEM EDITOR ───────────────────────────────────────────────────────────
function selectItem(id) {
  currentItemId = id;
  const item = inventory.find(i => i.id === id);
  if (!item) return;
  renderEditor(item);
  renderQueue(); // refresh active state
  document.getElementById('edit-empty').style.display = 'none';
  document.getElementById('edit-form').style.display  = 'block';
  document.getElementById('edit-panel').scrollTop = 0;
}

function renderEditor(item) {
  const status  = itemStatus(item);
  const missing = getMissingFields(item);
  const path    = (item.locationPath||[]).join(' › ');

  const bannerMsg = {
    unreviewed: '⬡ Not yet audited — please review all fields and assign a frequency',
    incomplete:  '⚠ Missing fields detected — fill in flagged fields below',
    overdue:     '⚑ Audit overdue — please re-review this item',
    clean:       '✓ Audit up to date'
  };

  const fq = filteredQueue();
  const qIdx = fq.findIndex(i => i.id === item.id);
  const qNum = qIdx >= 0 ? qIdx + 1 : '?';

  const freqCurrent = item.auditFreq || '';

  function freqOptCls(val) {
    if (freqCurrent !== val) return '';
    const map = { Quarterly:'selected-q', 'Bi-Annual':'selected-ba', Annual:'selected-a', Never:'selected-never' };
    return map[val] || '';
  }

  function sel(field, options) {
    const val = item[field] || '';
    const flagged = missing.includes(fieldLabel(field));
    const filled  = !!val && !flagged;
    const cls = flagged ? 'flagged' : (filled ? 'filled' : '');
    return `<select class="field-select ${cls}" id="f-${field}" onchange="liveUpdate(${item.id},'${field}',this.value)">
      <option value="">--</option>
      ${options.map(o => `<option${val===o?' selected':''}>${o}</option>`).join('')}
    </select>`;
  }

  function inp(field, placeholder='') {
    const val = item[field] || '';
    const flagged = missing.includes(fieldLabel(field));
    const filled  = !!val && !flagged;
    const cls = flagged ? 'flagged' : (filled ? 'filled' : '');
    return `<input class="field-input ${cls}" id="f-${field}" type="text" value="${esc(val)}" placeholder="${placeholder}" oninput="liveUpdate(${item.id},'${field}',this.value)">`;
  }

  document.getElementById('edit-form').innerHTML = `
    <div class="item-header">
      <div class="item-number">Item #${item.id} · Queue position ${qNum}</div>
      <div class="item-name-display">${esc(item.name||'Unnamed')}</div>
      <div class="item-loc-display">${path ? path.split(' › ').join('<span>›</span>') : '<span style="color:var(--text-dim)">No location set</span>'}</div>
    </div>

    <div class="audit-banner ${status}">
      <div class="audit-banner-dot"></div>
      ${bannerMsg[status]||''}
    </div>

    ${missing.length ? `<div class="missing-fields">
      <div class="missing-label">Missing fields</div>
      <div class="missing-tags">${missing.map(f=>`<span class="missing-tag" onclick="scrollToField('${f}')">${f}</span>`).join('')}</div>
    </div>` : ''}

    <!-- AUDIT FREQUENCY (required) -->
    <div class="field-section">
      <div class="field-section-title">Audit Frequency <span style="color:var(--rose)">*</span></div>
      <div class="freq-selector">
        <button class="freq-opt ${freqOptCls('Quarterly')}"   onclick="setFreq(${item.id},'Quarterly'  ,this)">Quarterly<br><span style="font-size:8px;opacity:0.6">every 90d</span></button>
        <button class="freq-opt ${freqOptCls('Bi-Annual')}"   onclick="setFreq(${item.id},'Bi-Annual'  ,this)">Bi-Annual<br><span style="font-size:8px;opacity:0.6">every 180d</span></button>
        <button class="freq-opt ${freqOptCls('Annual')}"      onclick="setFreq(${item.id},'Annual'     ,this)">Annual<br><span style="font-size:8px;opacity:0.6">every 365d</span></button>
        <button class="freq-opt ${freqOptCls('Never')}"       onclick="setFreq(${item.id},'Never'      ,this)">Never<br><span style="font-size:8px;opacity:0.6">one-time</span></button>
      </div>
      <div class="freq-required-hint" id="freq-hint">← Required before marking done</div>
    </div>

    <!-- CLASSIFICATION -->
    <div class="field-section">
      <div class="field-section-title">Classification</div>
      <div class="field-grid">
        <div class="field-group">
          <div class="field-label${missing.includes('Category')?'  flagged':''} required">Category</div>
          ${sel('category',['Electronics','Cables & Charging','Camera/Photo Gear','Military','Firearms & Ammo','Clothing','Footwear','Accessories','Tools & Hardware','Office Supplies','Bags & Carry','Personal Care & Grooming','Health & Supplements','Cleaning & Home','Furniture','Identity Documents','Legal Documents','Vehicle Documents','Military Documents','Financial Documents','Books & Notebooks','Gym & Fitness','Automotive','Memorabilia & Keepsakes','Misc'])}
        </div>
        <div class="field-group">
          <div class="field-label${missing.includes('Condition')?'  flagged':''} required">Condition</div>
          ${sel('condition',['New','Good','Fair','Poor'])}
        </div>
        <div class="field-group">
          <div class="field-label${missing.includes('Keep')?'  flagged':''} required">Keep</div>
          ${sel('keep',['Keep','Maybe','Sell','Trash'])}
        </div>
        <div class="field-group">
          <div class="field-label">Fill Level</div>
          ${sel('fillLevel',['Full','Most','Half','Low','Empty'])}
        </div>
      </div>
    </div>

    <!-- USAGE & IMPORTANCE -->
    <div class="field-section">
      <div class="field-section-title">Usage & Importance</div>
      <div class="field-grid">
        <div class="field-group">
          <div class="field-label${missing.includes('Frequency')?'  flagged':''} required">Frequency</div>
          ${sel('frequency',['Daily','Weekly','Monthly','Rarely','Never'])}
        </div>
        <div class="field-group">
          <div class="field-label${missing.includes('Criticality')?'  flagged':''} required">Criticality</div>
          ${sel('criticality',['Essential','Important','Nice to Have','Redundant'])}
        </div>
        <div class="field-group">
          <div class="field-label${missing.includes('Replaceability')?'  flagged':''} required">Replaceability</div>
          ${sel('replaceability',['Unique','Moderate','Easy/Cheap'])}
        </div>
        <div class="field-group">
          <div class="field-label${missing.includes('Est. Value')?'  flagged':''}" id="label-estValue">Est. Value</div>
          ${inp('estValue','e.g. 25')}
        </div>
      </div>
    </div>

    <!-- DETAILS -->
    <div class="field-section">
      <div class="field-section-title">Details</div>
      <div class="field-grid">
        <div class="field-group">
          <div class="field-label">Year Purchased</div>
          ${inp('yearPurchased','YYYY')}
        </div>
        <div class="field-group">
          <div class="field-label">Last Used</div>
          ${inp('lastUsed','MM/YYYY')}
        </div>
        <div class="field-group">
          <div class="field-label">Qty</div>
          ${inp('qty','')}
        </div>
        <div class="field-group">
          <div class="field-label">Serial / ID</div>
          ${inp('sn','')}
        </div>
      </div>
      <div class="field-grid" style="margin-top:10px">
        <div class="field-group field-full">
          <div class="field-label">Notes</div>
          <textarea class="field-textarea" id="f-notes" oninput="liveUpdate(${item.id},'notes',this.value)">${esc(item.notes||'')}</textarea>
        </div>
      </div>
    </div>

    <!-- ACTION BAR -->
    <div class="action-bar">
      <div class="action-bar-left">
        <button class="skip-btn" onclick="skipItem(${item.id})">Skip →</button>
      </div>
      <button class="btn btn-green" onclick="markDone(${item.id})">✓ Mark Audited</button>
    </div>
  `;
}

function fieldLabel(field) {
  const map = { category:'Category', condition:'Condition', keep:'Keep', frequency:'Frequency', criticality:'Criticality', replaceability:'Replaceability', estValue:'Est. Value', fillLevel:'Fill Level' };
  return map[field] || field;
}

function scrollToField(label) {
  const fieldMap = { 'Category':'f-category','Condition':'f-condition','Keep':'f-keep','Frequency':'f-frequency','Criticality':'f-criticality','Replaceability':'f-replaceability','Est. Value':'f-estValue' };
  const el = document.getElementById(fieldMap[label]);
  if (el) { el.scrollIntoView({behavior:'smooth',block:'center'}); el.focus(); }
}

// ─── LIVE UPDATE ───────────────────────────────────────────────────────────
function liveUpdate(id, field, value) {
  const item = inventory.find(i => i.id === id);
  if (!item) return;
  item[field] = value;
  // update field styling live
  const el = document.getElementById('f-' + field);
  if (el) {
    const missing = getMissingFields(item);
    const isMissing = missing.includes(fieldLabel(field));
    el.classList.toggle('flagged', isMissing);
    el.classList.toggle('filled', !!value && !isMissing);
  }
  scheduleSave(item);
}

function setFreq(id, freq, btn) {
  const item = inventory.find(i => i.id === id);
  if (!item) return;
  item.auditFreq = freq;
  // update button styling
  document.querySelectorAll('.freq-opt').forEach(b => {
    b.className = 'freq-opt';
  });
  const clsMap = { Quarterly:'selected-q', 'Bi-Annual':'selected-ba', Annual:'selected-a', Never:'selected-never' };
  btn.classList.add(clsMap[freq] || '');
  document.getElementById('freq-hint').classList.remove('visible');
  scheduleSave(item);
}

function scheduleSave(item) {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => saveItem(item), 800);
}

async function saveItem(item) {
  const ok = await sbUpsert(item);
  if (!ok) toast('⚠ Save error');
}

// ─── MARK DONE ─────────────────────────────────────────────────────────────
async function markDone(id) {
  const item = inventory.find(i => i.id === id);
  if (!item) return;

  if (!item.auditFreq) {
    document.getElementById('freq-hint').classList.add('visible');
    document.querySelector('.freq-selector').scrollIntoView({behavior:'smooth',block:'center'});
    toast('Please assign an audit frequency first');
    return;
  }

  // Flush any pending save first
  clearTimeout(_saveTimer);
  item.lastAudited = new Date().toISOString();
  const ok = await sbUpsert(item);
  if (!ok) { toast('⚠ Save error'); return; }

  toast('✓ Audited');
  buildQueue();
  renderQueue();

  // Advance to next unaudited item in current batch
  const fq = filteredQueue();
  const batchItems = fq.slice(batchStart, batchStart + BATCH_SIZE);
  const next = batchItems.find(i => i.id !== id && itemStatus(i) !== 'clean');
  if (next) {
    selectItem(next.id);
  } else {
    // check if there's more in the queue
    const nextOverall = fq.find(i => itemStatus(i) !== 'clean');
    if (nextOverall) {
      const nextBatchStart = Math.floor(fq.indexOf(nextOverall) / BATCH_SIZE) * BATCH_SIZE;
      batchStart = nextBatchStart;
      renderQueue();
      selectItem(nextOverall.id);
    } else {
      toast('🎉 All items in queue are clean!');
      document.getElementById('edit-empty').style.display = 'flex';
      document.getElementById('edit-empty').innerHTML = '<div class="edit-empty-icon">✓</div><div class="edit-empty-text">All items audited</div>';
      document.getElementById('edit-form').style.display = 'none';
    }
  }
}

function skipItem(id) {
  const fq = filteredQueue();
  const idx = fq.findIndex(i => i.id === id);
  const next = fq[idx + 1] || fq[idx - 1];
  if (next) selectItem(next.id);
}

// ─── UTIL ──────────────────────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ─── BOOT ──────────────────────────────────────────────────────────────────
init().then(() => {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('app').style.display = 'grid';
}).catch(err => {
  document.getElementById('loading-screen').innerHTML = `<div style="font-family:var(--font-mono);font-size:11px;color:var(--red)">Failed to load: ${err.message}</div>`;
});
</script>
</body>
</html>
