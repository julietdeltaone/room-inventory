<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Locate — Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:wght@300;400;500&family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0a0a0a; --s1:#131313; --s2:#1a1a1a; --s3:#222;
  --border:#2a2a2a; --border2:#3a3a3a;
  --text:#f2f2f2; --text-mid:#c8c8c8; --text-dim:#999;
  --rose:#b07a84; --green:#4d8f6a; --amber:#9e7a32;
  --font-display:'Cormorant Garamond',Georgia,serif;
  --font-ui:'Inter',system-ui,sans-serif;
  --font-mono:'DM Mono',monospace;
  --sidebar-w: 260px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-ui);-webkit-font-smoothing:antialiased;overflow:hidden;}
.shell{display:grid;grid-template-rows:52px 1fr;height:100vh;}

/* ── HEADER ── */
header{display:flex;align-items:center;padding:0 28px;border-bottom:1px solid var(--border);background:var(--bg);z-index:100;gap:20px;}
.logo{font-family:var(--font-mono);font-size:9px;letter-spacing:0.28em;color:var(--text-dim);text-transform:uppercase;flex-shrink:0;}
.header-search{flex:1;max-width:360px;background:transparent;border:none;border-bottom:1px solid var(--border);padding:7px 0;color:var(--text);font-family:var(--font-ui);font-size:13px;outline:none;transition:border-color 0.2s;}
.header-search:focus{border-bottom-color:var(--rose);}
.header-search::placeholder{color:var(--text-dim);}
.header-right{margin-left:auto;display:flex;align-items:center;gap:20px;}
.sync-pill{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:9px;letter-spacing:0.06em;color:var(--text-dim);}
#sync-dot{width:5px;height:5px;border-radius:50%;background:var(--text-dim);transition:background 0.4s;}
#sync-dot.ok{background:var(--green);box-shadow:0 0 6px rgba(77,143,106,0.5);}
#sync-dot.loading{background:var(--amber);animation:blink 1s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.editor-link{font-family:var(--font-mono);font-size:9px;letter-spacing:0.12em;color:var(--text-dim);text-decoration:none;text-transform:uppercase;transition:color 0.15s;}
.editor-link:hover{color:var(--text-mid);}

/* ── BODY ── */
.body{display:grid;grid-template-columns:var(--sidebar-w) 1fr;height:calc(100vh - 52px);overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{border-right:1px solid var(--border);overflow-y:auto;padding:16px 0;background:var(--bg);scrollbar-width:none;}
.sidebar::-webkit-scrollbar{display:none;}

/* All Items — big prominent button */
.sb-all{
  display:flex;align-items:center;justify-content:space-between;
  margin:0 12px 12px;padding:11px 16px;cursor:pointer;
  font-family:var(--font-ui);font-size:13px;font-weight:600;
  color:var(--text-dim);border:1px solid var(--border);border-radius:4px;
  transition:all 0.18s;letter-spacing:0.01em;
}
.sb-all:hover{color:var(--text);border-color:var(--border2);background:var(--s1);}
.sb-all.active{color:var(--text);border-color:var(--rose);background:rgba(176,122,132,0.08);}
.sb-all-count{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);}
.sb-all.active .sb-all-count{color:var(--rose);}
.sb-inuse{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:5px;border:1px solid var(--border1);background:transparent;cursor:pointer;font-family:var(--font-ui);font-size:12px;color:var(--text-mid);gap:8px;margin-bottom:6px;transition:border-color 0.15s,background 0.15s;}
.sb-inuse:hover{color:var(--text);border-color:var(--border2);background:var(--s1);}
.sb-inuse.active{color:#4d8f6a;border-color:#4d8f6a80;background:rgba(77,143,106,0.08);}
.sb-inuse-count{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);}
.sb-inuse.active .sb-inuse-count{color:#4d8f6a;}

.sb-row{
  display:flex;align-items:center;padding:7px 16px 7px 0;
  cursor:pointer;border-left:2px solid transparent;transition:border-color 0.15s,background 0.12s;
}
.sb-row:hover{background:var(--s1);}
.sb-row.active{border-left-color:currentColor;background:rgba(255,255,255,0.03);}
@keyframes sbPulse{from{opacity:0.4}to{opacity:1}}
.sb-row.active .sb-name{animation:sbPulse 0.22s ease both;}

.sb-arrow{width:24px;flex-shrink:0;font-size:7px;color:var(--text-dim);text-align:center;transition:transform 0.2s,color 0.15s;}
.sb-arrow.open{transform:rotate(90deg);}
.sb-name{flex:1;font-family:var(--font-ui);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color 0.15s;padding-right:4px;}
.sb-count{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);padding-right:16px;flex-shrink:0;}
.sb-children{display:none;border-left:1px solid var(--border);margin-left:24px;}
.sb-children.open{display:block;}

/* sidebar depth colors */
.d0 .sb-name{color:hsla(200,65%,72%,0.8);}  .d0.sb-row.active .sb-name{color:hsla(200,65%,72%,1);}
.d1 .sb-name{color:hsla(160,65%,70%,0.75);} .d1.sb-row.active .sb-name{color:hsla(160,65%,70%,1);}
.d2 .sb-name{color:hsla(45,70%,70%,0.7);}   .d2.sb-row.active .sb-name{color:hsla(45,70%,70%,1);}
.d3 .sb-name{color:hsla(280,60%,72%,0.7);}  .d3.sb-row.active .sb-name{color:hsla(280,60%,72%,1);}
.d4 .sb-name{color:hsla(20,65%,70%,0.7);}   .d4.sb-row.active .sb-name{color:hsla(20,65%,70%,1);}
.d5 .sb-name{color:hsla(320,60%,70%,0.7);}  .d5.sb-row.active .sb-name{color:hsla(320,60%,70%,1);}

/* ── STAGE ── */
.stage{overflow-y:auto;overflow-x:hidden;scrollbar-width:none;}
.stage::-webkit-scrollbar{display:none;}

.loading-state{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:16px;}
.loading-ring{width:28px;height:28px;border:1px solid var(--border2);border-top-color:var(--rose);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-label{font-family:var(--font-mono);font-size:9px;letter-spacing:0.2em;color:var(--text-dim);text-transform:uppercase;}

/* ── VIEW ── */
.view{min-height:100%;padding:44px 60px 80px;display:flex;flex-direction:column;align-items:center;animation:fadeUp 0.24s cubic-bezier(0.16,1,0.3,1) both;}
.view-inner{width:100%;max-width:880px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── BREADCRUMB ── */
.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:32px;flex-wrap:wrap;}
.bc-item{font-family:var(--font-mono);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim);cursor:pointer;transition:color 0.15s;}
.bc-item:hover{color:var(--text-mid);}
.bc-item.current{color:var(--text-mid);cursor:default;}
.bc-sep{color:var(--border2);font-size:9px;}

/* ── TITLE ── */
.loc-title-wrap{margin-bottom:44px;text-align:center;}
.loc-title{font-family:var(--font-display);font-size:clamp(40px,5vw,68px);font-weight:300;letter-spacing:0.01em;line-height:1.05;margin-bottom:12px;}
.loc-subtitle{font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;color:var(--text-mid);text-transform:uppercase;display:flex;justify-content:center;gap:24px;}

/* ── BACK BUTTON ── */
.back-btn{
  display:inline-flex;align-items:center;gap:8px;padding:9px 18px;margin-bottom:28px;
  background:var(--s1);border:1px solid var(--border2);border-radius:4px;
  font-family:var(--font-ui);font-size:12px;font-weight:500;color:var(--text-mid);
  cursor:pointer;transition:all 0.15s;
}
.back-btn:hover{background:var(--s2);color:var(--text);border-color:var(--border2);}
.back-arrow{font-size:14px;transition:transform 0.2s;}
.back-btn:hover .back-arrow{transform:translateX(-3px);}

/* ── BOXES ── */
.boxes-wrap{width:100%;margin-bottom:48px;}
.boxes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.box{
  background:var(--s1);border:1px solid var(--border);border-radius:3px;
  padding:26px 20px 20px;cursor:pointer;position:relative;overflow:hidden;
  transition:transform 0.28s cubic-bezier(0.16,1,0.3,1),background 0.2s,border-color 0.2s,box-shadow 0.28s cubic-bezier(0.16,1,0.3,1);
  animation:boxIn 0.32s cubic-bezier(0.16,1,0.3,1) both;
}
.box::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);}
.box:hover{transform:translateY(-4px);background:var(--s2);border-color:var(--border2);box-shadow:0 16px 48px rgba(0,0,0,0.5);}
.box:active{transform:translateY(-1px);transition-duration:0.08s;}
@keyframes boxIn{from{opacity:0;transform:translateY(14px) scale(0.985)}to{opacity:1;transform:translateY(0) scale(1)}}
.box:nth-child(1){animation-delay:.00s}.box:nth-child(2){animation-delay:.03s}.box:nth-child(3){animation-delay:.06s}
.box:nth-child(4){animation-delay:.09s}.box:nth-child(5){animation-delay:.12s}.box:nth-child(6){animation-delay:.15s}
.box:nth-child(7){animation-delay:.18s}.box:nth-child(8){animation-delay:.21s}.box:nth-child(n+9){animation-delay:.24s}
.box-line{width:18px;height:1px;margin-bottom:16px;transition:width 0.28s cubic-bezier(0.16,1,0.3,1);}
.box:hover .box-line{width:34px;}
.box-name{font-family:var(--font-display);font-size:22px;font-weight:300;line-height:1.2;margin-bottom:8px;}
.box-count{font-family:var(--font-mono);font-size:9px;letter-spacing:0.1em;color:var(--text-dim);text-transform:uppercase;}
.box-enter{position:absolute;bottom:16px;right:16px;font-size:11px;color:var(--text-dim);opacity:0;transform:translateX(-6px);transition:opacity 0.2s,transform 0.2s cubic-bezier(0.16,1,0.3,1);}
.box:hover .box-enter{opacity:1;transform:translateX(0);}

/* ── DIVIDER ── */
.section-div{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.section-div-label{font-family:var(--font-mono);font-size:9px;letter-spacing:0.16em;color:var(--text-mid);text-transform:uppercase;white-space:nowrap;}
.section-div-line{flex:1;height:1px;background:var(--border);}

/* ── ITEM CARDS ── */
.items-grid{display:flex;flex-direction:column;gap:6px;width:100%;}
.item-card{
  background:var(--s1);border:1px solid var(--border);border-left:3px solid transparent;
  border-radius:3px;padding:10px 14px;cursor:default;
  transition:background 0.15s,border-color 0.15s;
  animation:itemIn 0.28s cubic-bezier(0.16,1,0.3,1) both;
}
.item-card:hover{background:var(--s2);}
@keyframes itemIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
.item-card:nth-child(1){animation-delay:.00s}.item-card:nth-child(2){animation-delay:.02s}
.item-card:nth-child(3){animation-delay:.04s}.item-card:nth-child(4){animation-delay:.06s}
.item-card:nth-child(5){animation-delay:.08s}.item-card:nth-child(n+6){animation-delay:.10s}

/* Row 1: name left, price right */
.item-row1{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:4px;}
.doc-view-btn{background:none;border:none;cursor:pointer;font-size:15px;padding:0;line-height:1;opacity:0.7;transition:opacity 0.15s;flex-shrink:0;}
.doc-view-btn:hover{opacity:1;}

/* ── DOC LIGHTBOX ── */
.doc-lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.94);z-index:9000;display:none;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:0;}
.doc-lightbox.open{display:flex;}
.doc-lb-header{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--s1);}
.doc-lb-title{font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;color:var(--text-mid);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;padding-right:12px;}
.doc-lb-actions{display:flex;gap:10px;align-items:center;flex-shrink:0;}
.doc-lb-btn{font-family:var(--font-mono);font-size:9px;letter-spacing:0.1em;padding:5px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text-mid);cursor:pointer;transition:all 0.12s;white-space:nowrap;}
.doc-lb-btn:hover{border-color:var(--rose);color:var(--rose);}
.doc-lb-close{font-size:18px;color:var(--text-dim);cursor:pointer;background:none;border:none;padding:0 0 0 4px;line-height:1;transition:color 0.15s;}
.doc-lb-close:hover{color:var(--text);}
.doc-lb-body{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;padding:20px;width:100%;}
.doc-lb-img{max-width:100%;max-height:calc(100vh - 100px);object-fit:contain;border-radius:4px;}
.item-name-primary{font-family:var(--font-ui);font-size:13px;font-weight:600;color:var(--text);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-name-secondary{font-family:var(--font-ui);font-size:12px;font-weight:300;font-style:italic;color:var(--text-mid);margin-left:4px;}
.item-price{font-family:var(--font-mono);font-size:11px;font-weight:500;color:var(--text);letter-spacing:0.02em;white-space:nowrap;flex-shrink:0;}
.item-price-label{font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);margin-right:3px;}

/* Row 2: badge + pills left, notes right */
.item-row2{display:flex;align-items:center;gap:8px;min-height:20px;overflow:hidden;}
.item-cat-badge{font-family:var(--font-ui);font-size:9px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:2px 7px;border-radius:2px;white-space:nowrap;flex-shrink:0;}
.item-meta-inline{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.item-pill{font-family:var(--font-ui);font-size:10px;font-weight:500;color:var(--text-mid);display:flex;align-items:center;gap:3px;white-space:nowrap;}
.pill-lbl{font-size:8px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);}
.item-notes-inline{font-family:var(--font-ui);font-size:10px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}

/* Indicators */
.item-indicators{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.indicator-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-ui);font-size:9px;font-weight:500;padding:1px 6px;border-radius:2px;border:1px solid;letter-spacing:0.03em;white-space:nowrap;}
.ind-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;}
@keyframes inUsePulse {
  0%,100% { box-shadow: 0 0 4px rgba(77,143,106,0.6); }
  50%      { box-shadow: 0 0 10px rgba(77,143,106,0.9); }
}
.inuse-dot{width:6px;height:6px;border-radius:50%;background:#4d8f6a;flex-shrink:0;animation:inUsePulse 2s ease infinite;}

/* ── CATEGORY KEY ── */
.sb-section{margin:0 0 2px;}
.sb-section-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 12px 5px;cursor:pointer;user-select:none;}
.sb-section-label{font-family:var(--font-mono);font-size:8px;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-dim);}
.sb-section-arrow{font-size:8px;color:var(--text-dim);transition:transform 0.2s;}
.sb-section-arrow.open{transform:rotate(90deg);}
.sb-section-body{overflow:hidden;}
.sb-section-body.collapsed{display:none;}
.cat-key-item{display:flex;align-items:center;gap:8px;padding:4px 12px;cursor:pointer;border-radius:3px;transition:background 0.12s;}
.cat-key-item:hover{background:var(--s1);}
.cat-key-item.active{background:rgba(255,255,255,0.04);}
.cat-key-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cat-key-name{font-family:var(--font-ui);font-size:11px;color:var(--text-mid);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cat-key-count{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);}
.cat-key-item.active .cat-key-name{color:var(--text);}

/* ── RECENT LOCATIONS ── */
.recent-item{display:flex;align-items:center;gap:8px;padding:4px 12px;cursor:pointer;border-radius:3px;transition:background 0.12s;}
.recent-item:hover{background:var(--s1);}
.recent-path{font-family:var(--font-ui);font-size:11px;color:var(--text-mid);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.recent-leaf{color:var(--text);font-weight:500;}

/* ── JUMP INPUT ── */
.jump-wrap{padding:4px 12px 8px;}
.jump-input{width:100%;background:var(--s1);border:1px solid var(--border);border-radius:3px;padding:5px 8px;font-family:var(--font-mono);font-size:10px;color:var(--text);outline:none;transition:border-color 0.15s;}
.jump-input:focus{border-color:var(--border2);}
.jump-results{margin-top:3px;display:none;}
.jump-result{padding:3px 8px;font-family:var(--font-mono);font-size:10px;color:var(--text-mid);cursor:pointer;border-radius:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.jump-result:hover,.jump-result.active{background:var(--s2);color:var(--text);}

/* ── TREE SEARCH ── */
.tree-search-wrap{padding:4px 12px 6px;}
.tree-search-input{width:100%;background:var(--s1);border:1px solid var(--border);border-radius:3px;padding:5px 8px;font-family:var(--font-mono);font-size:10px;color:var(--text);outline:none;transition:border-color 0.15s;}
.tree-search-input:focus{border-color:var(--rose);}
.tree-search-input::placeholder{color:var(--text-dim);}
.sb-row.tree-match .sb-name em{background:rgba(176,122,132,0.3);color:var(--text);border-radius:2px;font-style:normal;padding:0 2px;}
.sb-row.tree-dimmed{opacity:0.3;}

/* ── LOCKED ITEMS SECTION ── */
.sb-locked-banner{margin:0 12px 6px;padding:10px 14px;border-radius:4px;border:1px solid rgba(180,100,100,0.35);background:rgba(120,50,50,0.15);cursor:pointer;transition:all 0.15s;}
.sb-locked-banner:hover{border-color:rgba(180,100,100,0.6);background:rgba(120,50,50,0.25);}
.sb-locked-banner.unlocked{border-color:rgba(100,160,100,0.35);background:rgba(50,100,60,0.15);}
.sb-locked-banner.unlocked:hover{border-color:rgba(100,160,100,0.6);}
.sb-locked-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.sb-locked-title{font-family:var(--font-ui);font-size:11px;font-weight:600;color:#c08080;}
.sb-locked-banner.unlocked .sb-locked-title{color:#80c090;}
.sb-locked-count{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);}
.sb-locked-hint{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);letter-spacing:0.04em;}

/* ── STATS STRIP ── */
.stats-strip{display:flex;gap:28px;margin-bottom:44px;justify-content:center;flex-wrap:wrap;}
.stat-cell{text-align:center;}
.stat-num{font-family:var(--font-mono);font-size:22px;font-weight:500;color:var(--text);letter-spacing:-0.02em;}
.stat-lbl{font-family:var(--font-mono);font-size:8px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-dim);margin-top:2px;}

/* ── SORT CONTROL ── */
.sort-strip{display:flex;align-items:center;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.sort-label{font-family:var(--font-mono);font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim);}
.sort-btn{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);background:none;border:1px solid var(--border);border-radius:2px;padding:2px 8px;cursor:pointer;transition:all 0.12s;}
.sort-btn:hover{color:var(--text-mid);border-color:var(--border2);}
.sort-btn.active{color:var(--rose);border-color:var(--rose);background:rgba(176,122,132,0.08);}

/* ── SIBLINGS ── */
.siblings-strip{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.sibling-chip{font-family:var(--font-ui);font-size:11px;color:var(--text-dim);background:var(--s1);border:1px solid var(--border);border-radius:3px;padding:4px 10px;cursor:pointer;transition:all 0.12s;white-space:nowrap;}
.sibling-chip:hover{color:var(--text-mid);border-color:var(--border2);}

/* ── CAT VIEW ── */
.cat-view{min-height:100%;padding:44px 60px 80px;display:flex;flex-direction:column;align-items:center;animation:fadeUp 0.24s cubic-bezier(0.16,1,0.3,1) both;}
.cat-view-inner{width:100%;max-width:880px;}

/* ── SEARCH RESULTS ── */
.search-view{min-height:100%;padding:44px 60px 80px;display:flex;flex-direction:column;align-items:center;animation:fadeUp 0.24s cubic-bezier(0.16,1,0.3,1) both;}
.search-inner{width:100%;max-width:880px;}
.search-title{font-family:var(--font-display);font-size:48px;font-weight:300;color:var(--text);margin-bottom:8px;}
.search-meta{font-family:var(--font-mono);font-size:9px;letter-spacing:0.14em;color:var(--text-mid);text-transform:uppercase;margin-bottom:40px;}

/* Search result card */
.sr-card{
  background:var(--s1);border:1px solid var(--border);border-left:3px solid transparent;
  border-radius:3px;padding:12px 16px;margin-bottom:6px;cursor:default;
  transition:background 0.15s;animation:itemIn 0.28s cubic-bezier(0.16,1,0.3,1) both;
}
.sr-card:hover{background:var(--s2);}
.sr-card:nth-child(1){animation-delay:.00s}.sr-card:nth-child(2){animation-delay:.02s}
.sr-card:nth-child(3){animation-delay:.04s}.sr-card:nth-child(4){animation-delay:.06s}
.sr-card:nth-child(n+5){animation-delay:.08s}

/* Row 1: name + qty */
.sr-row1{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:4px;}
.sr-name-primary{font-family:var(--font-ui);font-size:13px;font-weight:600;color:var(--text);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sr-name-secondary{font-family:var(--font-ui);font-size:12px;font-weight:300;font-style:italic;color:var(--text-mid);margin-left:4px;}
.sr-qty{font-family:var(--font-mono);font-size:11px;font-weight:500;color:var(--text);letter-spacing:0.02em;white-space:nowrap;flex-shrink:0;}

/* Row 2: badge + loc path inline */
.sr-row2{display:flex;align-items:center;gap:10px;margin-top:6px;}
.sr-loc-path{
  display:flex;align-items:center;gap:0;flex:1;
  background:rgba(0,0,0,0.2);border:1px solid var(--border);
  border-radius:3px;padding:6px 12px;overflow:hidden;
}
.sr-loc-seg{
  font-family:var(--font-ui);font-size:12px;font-weight:400;
  color:var(--text-mid);cursor:pointer;white-space:nowrap;
  transition:color 0.15s;flex-shrink:1;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:0.01em;
}
.sr-loc-seg:hover{color:var(--rose);}
.sr-loc-seg.leaf{color:var(--text);font-weight:700;flex-shrink:0;}
.sr-loc-sep{
  font-size:14px;color:var(--border2);
  flex-shrink:0;padding:0 6px;line-height:1;
  align-self:center;
}
/* Keyword match indicator */
.kw-match-row{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap;}
.kw-match-label{font-family:var(--font-mono);font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);flex-shrink:0;}
.kw-match-pill{
  font-family:var(--font-mono);font-size:10px;color:var(--text-dim);
  background:rgba(176,122,132,0.08);border:1px solid rgba(176,122,132,0.2);
  border-radius:2px;padding:1px 7px;letter-spacing:0.03em;
}</style>

function depthColor(d,a=1){const h=DEPTH_HUES[Math.min(d,DEPTH_HUES.length-1)];return`hsla(${h},65%,68%,${a})`;}

function catC(cat){return CAT[cat]||CAT['Misc'];}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function stringToPath(str){if(!str||!str.trim())return[];return str.split('>').map(s=>s.trim()).filter(Boolean);}
function pathToString(p){return(p||[]).join(' > ');}
function pathStartsWith(path,prefix){if(!prefix||!prefix.length)return true;if(path.length<prefix.length)return false;return prefix.every((s,i)=>s===path[i]);}

// Split item name into primary (before dash) and secondary (brand/after dash)
function splitName(name){
  const m=name.match(/^(.+?)\s+-\s+(.+)$/);
  if(m)return{primary:m[1].trim(),secondary:m[2].trim()};
  return{primary:name,secondary:null};
}

function rowToItem(row){
  return{id:row.id,name:row.name||'',category:row.category||'Misc',
    notes:row.notes,qty:row.qty,condition:row.condition,keep:row.keep,
    yearPurchased:row.year_purchased,estValue:row.est_value,
    fillLevel:row.fill_level,digitalCopy:row.digital_copy,
    inUse:row.in_use?true:false,
    lockedItem:row.locked_item?true:false,
    lockedNotes:row.locked_notes?true:false,
    keywords:row.keywords||'',
    docUrl:row.doc_url||null,
    locationPath:stringToPath(row.location||'')};
}

function buildTree(){
  const root={children:{},total:0};
  inventory.forEach(item=>{
    let node=root;node.total++;
    (item.locationPath||[]).forEach(seg=>{
      if(!node.children[seg])node.children[seg]={children:{},total:0};
      node.children[seg].total++;node=node.children[seg];
    });
  });
  return root;
}

// ── SIDEBAR ──────────────────────────────────────────────────────────────────
// ── SIDEBAR SECTION TOGGLE ───────────────────────────────────────────────────
function toggleSbSection(bodyId,arrowId){
  const body=document.getElementById(bodyId);
  const arrow=document.getElementById(arrowId);
  if(!body)return;
  const collapsed=body.classList.toggle('collapsed');
  if(arrow)arrow.classList.toggle('open',!collapsed);
  // persist
  try{
    const state=JSON.parse(localStorage.getItem(SB_COLLAPSE_KEY)||'{}');
    state[bodyId]=collapsed;
    localStorage.setItem(SB_COLLAPSE_KEY,JSON.stringify(state));
  }catch(e){}
}
function restoreSbCollapse(){
  try{
    const state=JSON.parse(localStorage.getItem(SB_COLLAPSE_KEY)||'{}');
    Object.entries(state).forEach(([bodyId,collapsed])=>{
      const body=document.getElementById(bodyId);
      const arrowId=bodyId.replace('-body','-arrow').replace('sb-tree-body','tree').replace('sb-tree','tree');
      const arrow=document.getElementById(arrowId);
      if(!body)return;
      if(collapsed){body.classList.add('collapsed');if(arrow)arrow.classList.remove('open');}
      else{body.classList.remove('collapsed');if(arrow)arrow.classList.add('open');}
    });
  }catch(e){}
}

// ── RECENT LOCATIONS ─────────────────────────────────────────────────────────
function getRecent(){try{return JSON.parse(localStorage.getItem(RECENT_KEY)||'[]');}catch(e){return[];}}
function pushRecent(path){
  if(!path||!path.length)return;
  const key=path.join('::');
  let r=getRecent().filter(x=>x.key!==key);
  r.unshift({key,path});
  if(r.length>8)r=r.slice(0,8);
  localStorage.setItem(RECENT_KEY,JSON.stringify(r));
  renderRecent();
}
function renderRecent(){
  const el=document.getElementById('recent-list');if(!el)return;
  const r=getRecent();
  if(!r.length){el.innerHTML='<div style="padding:4px 12px;font-family:var(--font-mono);font-size:9px;color:var(--text-dim)">No recent locations</div>';return;}
  el.innerHTML=r.map(({path})=>{
    const leaf=path[path.length-1];
    const parents=path.slice(0,-1);
    const pid=regPath(path);
    const prefix=parents.length?`<span style="font-size:9px;color:var(--text-dim)">${esc(parents.join(' › '))} › </span>`:'';
    return`<div class="recent-item" onclick="nav('${pid}')">
      <div class="recent-path">${prefix}<span class="recent-leaf">${esc(leaf)}</span></div>
    </div>`;
  }).join('');
}

// ── CATEGORY BROWSE ──────────────────────────────────────────────────────────
function setCatView(cat){
  _catView=cat;currentPath=[];searchQuery='';inUseView=false;
  document.getElementById('search-input').value='';
  renderSidebar();renderStage();
  document.getElementById('stage').scrollTo({top:0,behavior:'smooth'});

function renderCatBrowse(){

// ── CATEGORY COLOR KEY ────────────────────────────────────────────────────────

// ── JUMP TO LOCATION ─────────────────────────────────────────────────────────
let _jumpActive=-1;
function getAllPaths(){
  const paths=new Set();
  inventory.forEach(i=>{
    const p=i.locationPath||[];
    for(let j=1;j<=p.length;j++)paths.add(p.slice(0,j).join(' > '));
  });
  return [...paths].sort();
}
function updateJump(val){
  const res=document.getElementById('jump-results');if(!res)return;
  if(!val.trim()){res.style.display='none';res.innerHTML='';_jumpActive=-1;return;}
  const q=val.toLowerCase();
  const matches=getAllPaths().filter(p=>p.toLowerCase().includes(q)).slice(0,8);
  if(!matches.length){res.style.display='none';return;}
  _jumpActive=-1;
  res.style.display='block';
  res.innerHTML=matches.map((p,i)=>`<div class="jump-result" data-idx="${i}" data-path="${esc(p)}" onclick="jumpTo('${esc(p)}')">${esc(p)}</div>`).join('');
}
function jumpTo(pathStr){
  const path=pathStr.split(' > ').map(s=>s.trim()).filter(Boolean);
  document.getElementById('jump-input').value='';
  document.getElementById('jump-results').style.display='none';
  navigate(path);
}
function jumpKeydown(e){
  const res=document.getElementById('jump-results');
  const items=res?[...res.querySelectorAll('.jump-result')]:[];
  if(!items.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();_jumpActive=Math.min(_jumpActive+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('active',i===_jumpActive));}
  else if(e.key==='ArrowUp'){e.preventDefault();_jumpActive=Math.max(_jumpActive-1,0);items.forEach((el,i)=>el.classList.toggle('active',i===_jumpActive));}
  else if(e.key==='Enter'&&_jumpActive>=0){jumpTo(items[_jumpActive].dataset.path);}
  else if(e.key==='Escape'){res.style.display='none';document.getElementById('jump-input').value='';}
}

// ── SORT ─────────────────────────────────────────────────────────────────────
function setSort(mode){_sortMode=mode;renderStage();}
function sortItems(items){
  if(_sortMode==='name')return [...items].sort((a,b)=>a.name.localeCompare(b.name));
  if(_sortMode==='value')return [...items].sort((a,b)=>(parseFloat(b.estValue)||0)-(parseFloat(a.estValue)||0));
  if(_sortMode==='keep'){const order=['Keep','Maybe','Sell','Donate','Trash'];return [...items].sort((a,b)=>order.indexOf(a.keep)-order.indexOf(b.keep));}
  return items;
}

// ── PIN ──────────────────────────────────────────────────────────────────────
const PIN_KEY='inv_pin';
function getPin(){return localStorage.getItem(PIN_KEY)||'';}

// Shows a styled modal overlay instead of browser prompt/alert
function pinModal(title, hint, onSubmit){
  const existing=document.getElementById('pin-modal-overlay');
  if(existing)existing.remove();
  const overlay=document.createElement('div');
  overlay.id='pin-modal-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;';
  overlay.innerHTML=`
    <div style="background:#181818;border:1px solid #3a3a3a;border-radius:8px;padding:28px 32px;min-width:300px;max-width:360px;font-family:var(--font-ui);">
      <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;">${title}</div>
      ${hint?`<div style="font-size:11px;color:var(--text-dim);margin-bottom:16px;">${hint}</div>`:'<div style="margin-bottom:16px"></div>'}
      <input id="pin-modal-input" type="password" placeholder="Enter PIN…"
        style="width:100%;background:#111;border:1px solid #3a3a3a;border-radius:4px;padding:8px 10px;color:var(--text);font-family:var(--font-mono);font-size:13px;outline:none;letter-spacing:0.2em;margin-bottom:4px;"
        autocomplete="off">
      <div id="pin-modal-err" style="font-size:10px;color:#c07070;min-height:16px;margin-bottom:12px;font-family:var(--font-mono);"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button onclick="document.getElementById('pin-modal-overlay').remove()"
          style="padding:7px 16px;border-radius:4px;border:1px solid #3a3a3a;background:transparent;color:var(--text-mid);cursor:pointer;font-size:12px;">Cancel</button>
        <button id="pin-modal-ok"
          style="padding:7px 16px;border-radius:4px;border:1px solid var(--rose);background:rgba(176,122,132,0.15);color:var(--rose);cursor:pointer;font-size:12px;font-weight:600;">Unlock</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const input=overlay.querySelector('#pin-modal-input');
  const errEl=overlay.querySelector('#pin-modal-err');
  const okBtn=overlay.querySelector('#pin-modal-ok');
  input.focus();
  const submit=()=>{
    const val=input.value;
    const result=onSubmit(val);
    if(result===true){overlay.remove();}
    else{errEl.textContent=result||'Incorrect PIN';input.value='';input.focus();}
  };
  okBtn.onclick=submit;
  input.addEventListener('keydown',e=>{if(e.key==='Enter')submit();if(e.key==='Escape')overlay.remove();});
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
}

function verifyPin(cb){
  const pin=getPin();
  if(!pin){
    pinModal('No PIN Set','Set a PIN in the editor (any item inspector → Privacy → ⚙ PIN) before using this feature.',
      ()=>true);
    return;
  }
  pinModal('Private Items','Enter your PIN to view hidden items.',val=>{
    if(val===pin){cb();return true;}
    return'Incorrect PIN — try again';
  });
}

function unlockSession(){
  const pin=getPin();
  if(!pin){
    pinModal('No PIN Set','Set a PIN in the editor first.',()=>true);
    return;
  }
  pinModal('Unlock Private Items','Enter your PIN to reveal all hidden items for this session.',val=>{
    if(val===pin){_pinUnlocked=true;renderSidebar();renderStage();return true;}
    return'Incorrect PIN — try again';
  });
}

function lockSession(){_pinUnlocked=false;renderSidebar();renderStage();}

// Unlock notes for a single card — requires PIN, then reveals inline without reload
function unlockItemNotes(id){
  const pin=getPin();
  if(!pin){return;}
  // If session is already unlocked, reveal immediately
  if(_pinUnlocked){
    _revealNotes(id);return;
  }
  pinModal('Notes Locked','Enter your PIN to reveal notes for this item.',val=>{
    if(val===pin){_revealNotes(id);return true;}
    return'Incorrect PIN — try again';
  });
}
function _revealNotes(id){
  const item=inventory.find(i=>i.id===id);
  if(!item)return;
  const rawNote=item.notes||'';
  const kwIdx=rawNote.toLowerCase().indexOf('| keywords:');
  const displayNote=kwIdx!==-1?rawNote.slice(0,kwIdx).trim():rawNote;
  const ln=document.getElementById('locked-notes-'+id);
  if(ln){
    // Replace the lock pill with the actual note inline
    const span=document.createElement('span');
    span.className='item-notes-inline';
    span.style.fontSize='10px';
    span.style.color='var(--text-dim)';
    span.textContent=displayNote||'(no notes)';
    ln.replaceWith(span);
  }
}

function sortStripHTML(){
  const modes=[['default','Default'],['name','A–Z'],['value','Value ↓'],['keep','Keep']];
  return`<div class="sort-strip">
    <span class="sort-label">Sort</span>
    ${modes.map(([m,l])=>`<button class="sort-btn${_sortMode===m?' active':''}" onclick="setSort('${m}')">${l}</button>`).join('')}
  </div>`;
}

function statsStripHTML(){
  const vis=inventory.filter(i=>_pinUnlocked||!i.lockedItem);
  const inUseCount=vis.filter(i=>i.inUse).length;
  const cats=new Set(vis.map(i=>i.category)).size;
  const locs=new Set(vis.map(i=>(i.locationPath||[]).join('::'))).size;
  return`<div class="stats-strip">
    <div class="stat-cell"><div class="stat-num">${vis.length}</div><div class="stat-lbl">Items</div></div>
    <div class="stat-cell"><div class="stat-num">${inUseCount}</div><div class="stat-lbl">In Use</div></div>
    <div class="stat-cell"><div class="stat-num">${cats}</div><div class="stat-lbl">Categories</div></div>
    <div class="stat-cell"><div class="stat-num">${locs}</div><div class="stat-lbl">Locations</div></div>
  </div>`;
}

function siblingsHTML(path){
  if(!path.length)return'';
  const parentPath=path.slice(0,-1);
  const siblings=new Set();
  inventory.forEach(i=>{
    const p=i.locationPath||[];
    if(p.length>parentPath.length&&parentPath.every((s,j)=>s===p[j])){
      const sib=p[parentPath.length];
      if(sib&&sib!==path[parentPath.length])siblings.add(sib);
    }
  });
  if(!siblings.size)return'';
  const chips=[...siblings].sort().map(sib=>{
    const sibPath=[...parentPath,sib];
    const pid=regPath(sibPath);
    return`<span class="sibling-chip" onclick="nav('${pid}')">${esc(sib)}</span>`;
  }).join('');
  return`<div style="margin-bottom:16px"><div class="sort-label" style="margin-bottom:6px">Also in ${esc(parentPath[parentPath.length-1]||'this level')}</div><div class="siblings-strip">${chips}</div></div>`;
}

// ── TREE SEARCH ──────────────────────────────────────────────────────────────
let _treeQuery='';
function onTreeSearch(val){
  _treeQuery=val.toLowerCase().trim();
  renderTree();
}

function renderTree(){
  const tree=buildTree();
  const container=document.getElementById('sb-tree');
  container.innerHTML='';
  const q=_treeQuery;

  // If searching, flatten all paths and show matches directly
  if(q){
    const allPaths=getAllPaths();
    const matches=allPaths.filter(p=>p.toLowerCase().includes(q));
    if(!matches.length){
      container.innerHTML=`<div style="padding:6px 12px;font-family:var(--font-mono);font-size:9px;color:var(--text-dim)">No locations match</div>`;
      return;
    }
    matches.slice(0,30).forEach(pathStr=>{
      const path=pathStr.split(' > ').map(s=>s.trim()).filter(Boolean);
      const pid=regPath(path);
      const leaf=path[path.length-1];
      const parents=path.slice(0,-1);
      const row=document.createElement('div');
      row.className='sb-row tree-match d0';
      row.style.paddingLeft='8px';
      // highlight match in text
      const full=pathStr;
      const idx=full.toLowerCase().indexOf(q);
      let nameHTML=idx>=0
        ?esc(full.slice(0,idx))+`<em>${esc(full.slice(idx,idx+q.length))}</em>`+esc(full.slice(idx+q.length))
        :esc(full);
      row.innerHTML=`<span class="sb-name" style="color:var(--text-mid);font-size:11px">${nameHTML}</span>`;
      row.onclick=()=>navigate(path);
      container.appendChild(row);
    });
    return;
  }

  // Normal tree render
  function rNode(children,parentPath,container,depth){
    Object.entries(children).sort((a,b)=>b[1].total-a[1].total).forEach(([name,node])=>{
      const path=[...parentPath,name];
      const pk=path.join('::');
      const hasChildren=Object.keys(node.children).length>0;
      const isExpanded=expandedSb.has(pk);
      const isActive=!searchQuery&&currentPath.join('::')=== pk;
      const d=Math.min(depth,5);
      const wrap=document.createElement('div');
      const row=document.createElement('div');
      row.className=`sb-row d${d}${isActive?' active':''}`;
      row.style.paddingLeft=(depth*12+8)+'px';
      const arrow=document.createElement('span');
      arrow.className=`sb-arrow${!hasChildren?' leaf':isExpanded?' open':''}`;
      arrow.textContent=hasChildren?'▶':'';
      arrow.onclick=e=>{e.stopPropagation();if(!hasChildren)return;if(isExpanded)expandedSb.delete(pk);else expandedSb.add(pk);renderTree();};
      const nameEl=document.createElement('span');nameEl.className='sb-name';nameEl.textContent=name;
      const countEl=document.createElement('span');countEl.className='sb-count';countEl.textContent=node.total;
      row.appendChild(arrow);row.appendChild(nameEl);row.appendChild(countEl);
      row.onclick=()=>navigate(path);wrap.appendChild(row);
      if(hasChildren&&isExpanded){
        const ch=document.createElement('div');ch.className='sb-children open';
        rNode(node.children,path,ch,depth+1);wrap.appendChild(ch);
      }
      container.appendChild(wrap);
    });
  }
  rNode(tree.children,[],container,0);
}

function renderSidebar(){
  const tree=buildTree();
  const inUseCount=inventory.filter(i=>i.inUse).length;
  document.getElementById('sb-all-count').textContent=tree.total;
  document.getElementById('sb-inuse-count').textContent=inUseCount;
  document.getElementById('sb-all').classList.toggle('active',!currentPath.length&&!searchQuery&&!inUseView&&!_catView);
  document.getElementById('sb-inuse').classList.toggle('active',inUseView);
  renderCatBrowse();
  renderCatKey();
  renderRecent();

  // Locked items banner
  const lockedCount=inventory.filter(i=>i.lockedItem).length;
  const banner=document.getElementById('sb-locked-banner');
  if(banner){
    if(lockedCount>0){
      banner.style.display='block';
      banner.className=`sb-locked-banner${_pinUnlocked?' unlocked':''}`;
      banner.innerHTML=`
        <div class="sb-locked-top">
          <span class="sb-locked-title">${_pinUnlocked?'🔓 Private Unlocked':'🔒 Private Items'}</span>
          <span class="sb-locked-count">${lockedCount}</span>
        </div>
        <div class="sb-locked-hint">${_pinUnlocked?'Tap to re-lock this session':'Tap to unlock and view hidden items'}</div>`;

    }

  renderTree();
}

// ── NAVIGATE ─────────────────────────────────────────────────────────────────
function navigate(path){
  currentPath=path;searchQuery='';inUseView=false;_catView=null;
  document.getElementById('search-input').value='';
  for(let i=1;i<=path.length;i++)expandedSb.add(path.slice(0,i).join('::'));
  if(path.length)pushRecent(path);
  renderSidebar();renderStage();
  document.getElementById('stage').scrollTo({top:0,behavior:'smooth'});
}

function setInUseView(){
  inUseView=true;currentPath=[];searchQuery='';_catView=null;
  document.getElementById('search-input').value='';
  renderSidebar();renderStage();
  document.getElementById('stage').scrollTo({top:0,behavior:'smooth'});
}

// ── RENDER STAGE ─────────────────────────────────────────────────────────────
function renderStage(){
  const stage=document.getElementById('stage');

  // Category browse mode
  if(_catView){
    const items=sortItems(inventory.filter(i=>i.category===_catView&&(_pinUnlocked||!i.lockedItem)));
    const cs=CAT[_catView]||CAT['Misc'];
    const cards=items.map(item=>itemCardHTML(item)).join('');
    stage.innerHTML=`<div class="cat-view"><div class="cat-view-inner">
      <div class="loc-title-wrap">
        <div class="loc-title" style="color:${cs.text}">${esc(_catView)}</div>
        <div class="loc-subtitle"><span>${items.length} item${items.length!==1?'s':''}</span></div>
      </div>
      ${sortStripHTML()}
      <div class="items-grid">${cards||'<div style="color:var(--text-dim);font-size:13px;padding:24px 0">No items in this category.</div>'}</div>
    </div></div>`;
    return;
  }

  // In Use mode
  if(inUseView){
    const items=sortItems(inventory.filter(i=>i.inUse&&(_pinUnlocked||!i.lockedItem)));
    const cards=items.map(item=>itemCardHTML(item)).join('');
    stage.innerHTML=`<div class="view"><div class="view-inner">
      <div class="loc-title-wrap">
        <div class="loc-title" style="color:#4d8f6a;display:flex;align-items:center;gap:8px">
          <span class="inuse-dot"></span>In Use
        </div>
        <div class="loc-subtitle"><span>${items.length} item${items.length!==1?'s':''} currently in use</span></div>
      </div>
      ${sortStripHTML()}
      <div style='display:none'><!--placeholder--></div>
      <div style='display:none'>
      </div>
      <div class="items-list">${cards||'<div style="color:var(--text-dim);font-size:13px;padding:24px 0">No items currently marked as in use.</div>'}</div>
    </div></div>`;
    return;
  }

  // Search mode
  if(searchQuery){
    const q=searchQuery.toLowerCase();

    // Compute match type per item
    const results=[];
    inventory.forEach(i=>{
      if(!_pinUnlocked&&i.lockedItem)return;
      const nameMatch = i.name.toLowerCase().includes(q);
      const catMatch  = (i.category||'').toLowerCase().includes(q);
      const locMatch  = pathToString(i.locationPath).toLowerCase().includes(q);
      const noteMatch = (i.notes||'').toLowerCase().includes(q);
      const kwText    = i.keywords || '';
      const kwMatch   = kwText.toLowerCase().includes(q);

      if(nameMatch||catMatch||locMatch||kwMatch||noteMatch){
        // Find which keyword(s) matched for display
        let matchedKw = null;
        if(kwMatch && !nameMatch){
          const kwList = kwText.split(',').map(s=>s.trim()).filter(Boolean);
          matchedKw = kwList.filter(k=>k.toLowerCase().includes(q));
        }
        results.push({item:i, nameMatch, catMatch, locMatch, kwMatch, noteMatch, matchedKw});
      }
    });

    // Sort: name matches first, then keyword, then others
    results.sort((a,b)=>{
      const scoreA = a.nameMatch?3:a.kwMatch?2:1;
      const scoreB = b.nameMatch?3:b.kwMatch?2:1;
      return scoreB-scoreA;
    });

    const cards=results.map(r=>searchCardHTML(r.item, q, r.nameMatch, r.matchedKw)).join('');
    stage.innerHTML=`<div class="search-view"><div class="search-inner">
      <div class="search-title">Search</div>
      <div class="search-meta">${results.length} result${results.length!==1?'s':''} · "${esc(searchQuery)}"</div>
      <div>${cards}</div>
    </div></div>`;
    return;
  }

  // Location mode
  const path=currentPath;
  const allItemsRaw=inventory.filter(i=>pathStartsWith(i.locationPath||[],path));
  const allItems=allItemsRaw.filter(i=>_pinUnlocked||!i.lockedItem);
  const lockedHere=!_pinUnlocked?allItemsRaw.filter(i=>i.lockedItem&&(i.locationPath||[]).length===path.length).length:0;
  const directItems=allItems.filter(i=>(i.locationPath||[]).length===path.length);
  const childMap={};
  allItems.forEach(item=>{
    const p=item.locationPath||[];
    if(p.length>path.length){const seg=p[path.length];if(!childMap[seg])childMap[seg]=0;childMap[seg]++;}
  });
  const children=Object.entries(childMap).sort((a,b)=>b[1]-a[1]);
  const title=path.length?path[path.length-1]:'All Items';
  const depth=path.length;
  const titleColor=path.length?depthColor(depth-1,1):'var(--text)';

  // Breadcrumb
  const bc=['All',...path].map((seg,i)=>{
    const isCurrent=i===path.length;
    const p=i===0?[]:path.slice(0,i).concat(seg);
    const pid=regPath(p);
    return`<span class="bc-item${isCurrent?' current':''}" onclick="nav('${pid}')">${esc(seg)}</span>${!isCurrent?'<span class="bc-sep">›</span>':''}`;
  }).join('');

  const backPath=path.slice(0,-1);
  const backPid=regPath(backPath);
  const backLabel=path.length>1?esc(path[path.length-2]):'All Items';
  const backBtn=path.length>0?`<button class="back-btn" onclick="nav('${backPid}')">
    <span class="back-arrow">←</span><span>${backLabel}</span>
  </button>`:
  `<button class="back-btn" style="opacity:0.35;pointer-events:none">
    <span class="back-arrow">←</span><span>All Items</span>
  </button>`;

  let html=`<div class="view"><div class="view-inner">
    <div class="breadcrumb">${bc}</div>
    ${backBtn}
    <div class="loc-title-wrap">
      <div class="loc-title" style="color:${titleColor}">${esc(title)}</div>
      <div class="loc-subtitle">
        <span>${allItems.length} item${allItems.length!==1?'s':''}</span>
        ${children.length?`<span>${children.length} location${children.length!==1?'s':''}</span>`:''}
      </div>
    </div>
    ${path.length===0?statsStripHTML():''}
    ${path.length>1?siblingsHTML(path):''}`;

  // Boxes
  if(children.length){
    const childColor=depthColor(depth,1);
    const childColorDim=depthColor(depth,0.35);
    html+=`<div class="boxes-wrap"><div class="boxes-grid">`;
    children.forEach(([name,count])=>{
      const childPath=[...path,name];
      const pid=regPath(childPath);
      html+=`<div class="box" onclick="nav('${pid}')">
        <div class="box-line" style="background:${childColorDim}"></div>
        <div class="box-name" style="color:${childColor}">${esc(name)}</div>
        <div class="box-count">${count} item${count!==1?'s':''}</div>
        <div class="box-enter">→</div>
      </div>`;
    });
    html+=`</div></div>`;
  }

  // Direct items
  if(directItems.length||lockedHere>0){
    const lockedPlaceholder=lockedHere>0?`
      <div onclick="unlockSession()" style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(100,50,50,0.12);border:1px solid rgba(180,100,100,0.2);border-left:3px solid rgba(180,100,100,0.5);border-radius:3px;cursor:pointer;margin-top:${directItems.length?'4px':'0'}">
        <span style="font-size:16px">🔒</span>
        <div>
          <div style="font-size:12px;font-weight:600;color:#c08080">${lockedHere} private item${lockedHere!==1?'s':''} hidden</div>
          <div style="font-family:var(--font-mono);font-size:10px;color:var(--text-dim);margin-top:2px">Tap to unlock with PIN</div>
        </div>
      </div>`:'';
    html+=`<div class="section-div">
      <div class="section-div-label">Items${path.length?' here':''}</div>
      <div class="section-div-line"></div>
      <div class="section-div-label">${directItems.length+(lockedHere>0?'+🔒':'')}</div>
    </div>
    ${sortStripHTML()}
    <div class="items-grid">${sortItems(directItems).map(i=>itemCardHTML(i)).join('')}${lockedPlaceholder}</div>`;
  }

  if(!children.length&&!directItems.length&&!lockedHere){
    html+=`<div style="text-align:center;padding:80px 0;font-family:var(--font-mono);font-size:9px;letter-spacing:0.18em;color:var(--text-dim);text-transform:uppercase">Empty</div>`;
  }
  html+=`</div></div>`;
  stage.innerHTML=html;
}

// ── ITEM CARD (location view) ─────────────────────────────────────────────────
function itemCardHTML(item){
  const cs=catC(item.category);
  const{primary,secondary}=splitName(item.name);
  const parts=[];
  if(item.condition)parts.push({l:'Cond',v:item.condition});
  if(item.keep&&item.keep!=='Keep')parts.push({l:'Keep',v:item.keep});
  if(item.qty&&item.qty!=='1')parts.push({l:'Qty',v:'\xd7'+item.qty});

  const rawNote=item.notes||'';
  const kwIdx=rawNote.toLowerCase().indexOf('| keywords:');
  const displayNote=kwIdx!==-1?rawNote.slice(0,kwIdx).trim():rawNote;

  // Locked notes: show a tap-to-unlock pill. Don't render the actual note in DOM at all
  // until PIN is verified (content injected dynamically by _revealNotes)

    ?`<span id="locked-notes-${item.id}" style="display:inline-flex;align-items:center;gap:5px;font-size:10px;color:#b06868;font-family:var(--font-mono);cursor:pointer;border:1px solid rgba(180,100,100,0.3);border-radius:3px;padding:1px 7px;" onclick="unlockItemNotes(${item.id})">🔒 notes locked</span>`

  const digitalBadge=item.digitalCopy?`<span class="indicator-badge" style="color:#6e8fa8;border-color:#6e8fa840"><span class="ind-dot" style="background:#6e8fa8"></span>Digital</span>`:'';

  const docBtn=item.docUrl?`<button class="doc-view-btn" onclick="openDocViewer('${esc(item.docUrl)}','${esc(item.name)}')" title="View document">📄</button>`:'';

  return`<div class="item-card" style="border-left-color:${cs.text};background:${cs.bg};border-color:${cs.border}">
    <div class="item-row1">
      <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">
        <span class="item-name-primary">${esc(primary)}</span>${secondary?`<span class="item-name-secondary"> — ${esc(secondary)}</span>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        ${docBtn}

      </div>
    </div>
    <div class="item-row2">
      <span class="item-cat-badge" style="background:rgba(0,0,0,0.3);color:${cs.text}">${esc(item.category)}</span>
      ${parts.length?`<div class="item-meta-inline">${parts.map(p=>`<span class="item-pill"><span class="pill-lbl">${p.l}</span>${esc(p.v)}</span>`).join('')}</div>`:''}
      ${fillBadge||digitalBadge||inUseBadge?`<div class="item-indicators">${inUseBadge}${fillBadge}${digitalBadge}</div>`:''}
      ${notesHTML}
    </div>
  </div>`;
}

// ── SEARCH RESULT CARD ────────────────────────────────────────────────────────
function searchCardHTML(item, q, nameMatch, matchedKw){
  const cs=catC(item.category);
  const{primary,secondary}=splitName(item.name);
  const path=item.locationPath||[];

  // Highlight matched text in name
  function highlight(text){
    if(!q||!nameMatch) return esc(text);
    const idx=text.toLowerCase().indexOf(q);
    if(idx===-1) return esc(text);
    return esc(text.slice(0,idx))
      +`<mark style="background:rgba(176,122,132,0.35);color:var(--text);border-radius:2px;padding:0 1px">${esc(text.slice(idx,idx+q.length))}</mark>`
      +esc(text.slice(idx+q.length));
  }

  // Full-width location path with depth-colored segments
  const DEPTH_HUES=[200,160,45,280,20,320];
  let locPath='';
  if(path.length){
    locPath='<div class="sr-loc-path">';
    path.forEach((seg,i)=>{
      const isLeaf=i===path.length-1;
      const pid=regPath(path.slice(0,i+1));
      const hue=DEPTH_HUES[Math.min(i,DEPTH_HUES.length-1)];
      const col=isLeaf?`hsla(${hue},65%,72%,1)`:`hsla(${hue},55%,60%,0.7)`;
      const weight=isLeaf?'700':'400';
      const size=isLeaf?'13px':'12px';
      locPath+=`<span class="sr-loc-seg${isLeaf?' leaf':''}" onclick="nav('${pid}')" style="color:${col};font-weight:${weight};font-size:${size}">${esc(seg)}</span>`;
      if(!isLeaf)locPath+=`<span class="sr-loc-sep">›</span>`;
    });
    locPath+='</div>';
  }

  // Keyword match indicator
  let kwIndicator='';
  if(matchedKw&&matchedKw.length){
    const pills=matchedKw.slice(0,4).map(k=>{
      const idx=k.toLowerCase().indexOf(q);
      let display=esc(k);
      if(idx!==-1){
        display=esc(k.slice(0,idx))
          +`<b style="color:var(--text)">${esc(k.slice(idx,idx+q.length))}</b>`
          +esc(k.slice(idx+q.length));
      }
      return`<span class="kw-match-pill">${display}</span>`;
    }).join('');
    kwIndicator=`<div class="kw-match-row"><span class="kw-match-label">keyword match</span>${pills}</div>`;
  }

  const qty=item.qty&&item.qty!=='1'?`<span class="sr-qty">×${esc(item.qty)}</span>`:'';
  const srInUseBadge=item.inUse?`<span class="indicator-badge" style="color:#4d8f6a;border-color:#4d8f6a40;margin-left:4px"><span class="inuse-dot" style="width:4px;height:4px"></span>In Use</span>`:'';
  const srDocBtn=item.docUrl?`<button class="doc-view-btn" onclick="openDocViewer('${esc(item.docUrl)}','${esc(item.name)}')" title="View document" style="margin-left:4px">📎</button>`:'';

  return`<div class="sr-card" style="border-left-color:${cs.text};background:${cs.bg};border-color:${cs.border}">
    <div class="sr-row1">
      <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">
        <span class="sr-name-primary">${highlight(primary)}</span>${secondary?`<span class="sr-name-secondary"> — ${highlight(secondary)}</span>`:''}
      </div>
      <span class="item-cat-badge" style="background:rgba(0,0,0,0.3);color:${cs.text};flex-shrink:0;align-self:center">${esc(item.category)}</span>
      ${qty}${srInUseBadge}${srDocBtn}
    </div>
    ${locPath}
    ${kwIndicator}
  </div>`;
}

// Search
document.getElementById('search-input').addEventListener('input',e=>{
  searchQuery=e.target.value.trim();inUseView=false;_catView=null;renderSidebar();renderStage();
  document.getElementById('stage').scrollTo({top:0});
});

// Load
async function load(){
  setSyncStatus('loading');
  try{
    let all=[],from=0,page=1000;
    while(true){
      const res=await fetch(`${SUPABASE_URL}/rest/v1/inventory?select=*&order=name.asc&offset=${from}&limit=${page}`,{
        headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Range':`${from}-${from+page-1}`}
      });
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      const rows=await res.json();
      all=all.concat(rows.map(rowToItem));
      if(rows.length<page)break;from+=page;
    }
    inventory=all;setSyncStatus('ok');renderSidebar();renderStage();restoreSbCollapse();
  }catch(err){
    setSyncStatus('error');
    document.getElementById('stage').innerHTML=`<div class="loading-state"><div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;color:var(--text-dim)">Failed — ${esc(err.message)}</div></div>`;
  }
}
function setSyncStatus(s){
  document.getElementById('sync-dot').className=s==='ok'?'ok':s==='loading'?'loading':'';
  document.getElementById('sync-label').textContent=s==='ok'?`${inventory.length} items`:s==='loading'?'loading':'error';
}
load();
</script>
<!-- ── DOC LIGHTBOX ── -->
<div class="doc-lightbox" id="doc-lightbox" onclick="docLbBgClick(event)">
  <div class="doc-lb-header">
    <div class="doc-lb-title" id="doc-lb-title"></div>
    <div class="doc-lb-actions">
      <a class="doc-lb-btn" id="doc-lb-open" href="" target="_blank" rel="noopener">Open full size ↗</a>
      <a class="doc-lb-btn" id="doc-lb-dl" href="" download>Download ↓</a>
      <button class="doc-lb-close" onclick="closeDocViewer()">✕</button>
    </div>
  </div>
  <div class="doc-lb-body">
    <img class="doc-lb-img" id="doc-lb-img" alt="Document">
  </div>
</div>

<script>
function openDocViewer(url, name){
  document.getElementById('doc-lb-title').textContent = name;
  document.getElementById('doc-lb-img').src = url;
  document.getElementById('doc-lb-open').href = url;
  document.getElementById('doc-lb-dl').href = url;
  document.getElementById('doc-lb-dl').download = name.replace(/[^a-z0-9]/gi,'_') + '.jpg';
  document.getElementById('doc-lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDocViewer(){
  document.getElementById('doc-lightbox').classList.remove('open');
  document.getElementById('doc-lb-img').src = '';
  document.body.style.overflow = '';
}
function docLbBgClick(e){
  if(e.target === document.getElementById('doc-lightbox')) closeDocViewer();
}
document.addEventListener('keydown', e => {
  if(e.key === 'Escape') closeDocViewer();
});
</script>
</body>
