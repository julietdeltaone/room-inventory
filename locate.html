<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Locate — Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:wght@300;400;500&family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0a0a0a; --s1:#131313; --s2:#1a1a1a; --s3:#222;
  --border:#2a2a2a; --border2:#3a3a3a;
  --text:#f2f2f2; --text-mid:#c8c8c8; --text-dim:#999;
  --rose:#b07a84; --green:#4d8f6a; --amber:#9e7a32;
  --font-display:'Cormorant Garamond',Georgia,serif;
  --font-ui:'Inter',system-ui,sans-serif;
  --font-mono:'DM Mono',monospace;
  --sidebar-w: 260px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-ui);-webkit-font-smoothing:antialiased;overflow:hidden;}
.shell{display:grid;grid-template-rows:52px 1fr;height:100vh;}

/* ── HEADER ── */
header{display:flex;align-items:center;padding:0 28px;border-bottom:1px solid var(--border);background:var(--bg);z-index:100;gap:20px;}
.logo{font-family:var(--font-mono);font-size:9px;letter-spacing:0.28em;color:var(--text-dim);text-transform:uppercase;flex-shrink:0;}
.header-search{flex:1;max-width:360px;background:transparent;border:none;border-bottom:1px solid var(--border);padding:7px 0;color:var(--text);font-family:var(--font-ui);font-size:13px;outline:none;transition:border-color 0.2s;}
.header-search:focus{border-bottom-color:var(--rose);}
.header-search::placeholder{color:var(--text-dim);}
.header-right{margin-left:auto;display:flex;align-items:center;gap:20px;}
.sync-pill{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:9px;letter-spacing:0.06em;color:var(--text-dim);}
#sync-dot{width:5px;height:5px;border-radius:50%;background:var(--text-dim);transition:background 0.4s;}
#sync-dot.ok{background:var(--green);box-shadow:0 0 6px rgba(77,143,106,0.5);}
#sync-dot.loading{background:var(--amber);animation:blink 1s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.editor-link{font-family:var(--font-mono);font-size:9px;letter-spacing:0.12em;color:var(--text-dim);text-decoration:none;text-transform:uppercase;transition:color 0.15s;}
.editor-link:hover{color:var(--text-mid);}

/* ── BODY ── */
.body{display:grid;grid-template-columns:var(--sidebar-w) 1fr;height:calc(100vh - 52px);overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{border-right:1px solid var(--border);overflow-y:auto;padding:16px 0;background:var(--bg);scrollbar-width:none;}
.sidebar::-webkit-scrollbar{display:none;}

/* All Items — big prominent button */
.sb-all{
  display:flex;align-items:center;justify-content:space-between;
  margin:0 12px 12px;padding:11px 16px;cursor:pointer;
  font-family:var(--font-ui);font-size:13px;font-weight:600;
  color:var(--text-dim);border:1px solid var(--border);border-radius:4px;
  transition:all 0.18s;letter-spacing:0.01em;
}
.sb-all:hover{color:var(--text);border-color:var(--border2);background:var(--s1);}
.sb-all.active{color:var(--text);border-color:var(--rose);background:rgba(176,122,132,0.08);}
.sb-all-count{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);}
.sb-all.active .sb-all-count{color:var(--rose);}

.sb-row{
  display:flex;align-items:center;padding:7px 16px 7px 0;
  cursor:pointer;border-left:2px solid transparent;transition:border-color 0.15s,background 0.12s;
}
.sb-row:hover{background:var(--s1);}
.sb-row.active{border-left-color:currentColor;background:rgba(255,255,255,0.03);}
@keyframes sbPulse{from{opacity:0.4}to{opacity:1}}
.sb-row.active .sb-name{animation:sbPulse 0.22s ease both;}

.sb-arrow{width:24px;flex-shrink:0;font-size:7px;color:var(--text-dim);text-align:center;transition:transform 0.2s,color 0.15s;}
.sb-arrow.open{transform:rotate(90deg);}
.sb-name{flex:1;font-family:var(--font-ui);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color 0.15s;padding-right:4px;}
.sb-count{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);padding-right:16px;flex-shrink:0;}
.sb-children{display:none;border-left:1px solid var(--border);margin-left:24px;}
.sb-children.open{display:block;}

/* sidebar depth colors */
.d0 .sb-name{color:hsla(200,65%,72%,0.8);}  .d0.sb-row.active .sb-name{color:hsla(200,65%,72%,1);}
.d1 .sb-name{color:hsla(160,65%,70%,0.75);} .d1.sb-row.active .sb-name{color:hsla(160,65%,70%,1);}
.d2 .sb-name{color:hsla(45,70%,70%,0.7);}   .d2.sb-row.active .sb-name{color:hsla(45,70%,70%,1);}
.d3 .sb-name{color:hsla(280,60%,72%,0.7);}  .d3.sb-row.active .sb-name{color:hsla(280,60%,72%,1);}
.d4 .sb-name{color:hsla(20,65%,70%,0.7);}   .d4.sb-row.active .sb-name{color:hsla(20,65%,70%,1);}
.d5 .sb-name{color:hsla(320,60%,70%,0.7);}  .d5.sb-row.active .sb-name{color:hsla(320,60%,70%,1);}

/* ── STAGE ── */
.stage{overflow-y:auto;overflow-x:hidden;scrollbar-width:none;}
.stage::-webkit-scrollbar{display:none;}

.loading-state{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:16px;}
.loading-ring{width:28px;height:28px;border:1px solid var(--border2);border-top-color:var(--rose);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-label{font-family:var(--font-mono);font-size:9px;letter-spacing:0.2em;color:var(--text-dim);text-transform:uppercase;}

/* ── VIEW ── */
.view{min-height:100%;padding:44px 60px 80px;display:flex;flex-direction:column;align-items:center;animation:fadeUp 0.24s cubic-bezier(0.16,1,0.3,1) both;}
.view-inner{width:100%;max-width:880px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── BREADCRUMB ── */
.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:32px;flex-wrap:wrap;}
.bc-item{font-family:var(--font-mono);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-dim);cursor:pointer;transition:color 0.15s;}
.bc-item:hover{color:var(--text-mid);}
.bc-item.current{color:var(--text-mid);cursor:default;}
.bc-sep{color:var(--border2);font-size:9px;}

/* ── TITLE ── */
.loc-title-wrap{margin-bottom:44px;text-align:center;}
.loc-title{font-family:var(--font-display);font-size:clamp(40px,5vw,68px);font-weight:300;letter-spacing:0.01em;line-height:1.05;margin-bottom:12px;}
.loc-subtitle{font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;color:var(--text-mid);text-transform:uppercase;display:flex;justify-content:center;gap:24px;}

/* ── BACK BUTTON ── */
.back-btn{
  display:inline-flex;align-items:center;gap:8px;padding:9px 18px;margin-bottom:28px;
  background:var(--s1);border:1px solid var(--border2);border-radius:4px;
  font-family:var(--font-ui);font-size:12px;font-weight:500;color:var(--text-mid);
  cursor:pointer;transition:all 0.15s;
}
.back-btn:hover{background:var(--s2);color:var(--text);border-color:var(--border2);}
.back-arrow{font-size:14px;transition:transform 0.2s;}
.back-btn:hover .back-arrow{transform:translateX(-3px);}

/* ── BOXES ── */
.boxes-wrap{width:100%;margin-bottom:48px;}
.boxes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.box{
  background:var(--s1);border:1px solid var(--border);border-radius:3px;
  padding:26px 20px 20px;cursor:pointer;position:relative;overflow:hidden;
  transition:transform 0.28s cubic-bezier(0.16,1,0.3,1),background 0.2s,border-color 0.2s,box-shadow 0.28s cubic-bezier(0.16,1,0.3,1);
  animation:boxIn 0.32s cubic-bezier(0.16,1,0.3,1) both;
}
.box::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);}
.box:hover{transform:translateY(-4px);background:var(--s2);border-color:var(--border2);box-shadow:0 16px 48px rgba(0,0,0,0.5);}
.box:active{transform:translateY(-1px);transition-duration:0.08s;}
@keyframes boxIn{from{opacity:0;transform:translateY(14px) scale(0.985)}to{opacity:1;transform:translateY(0) scale(1)}}
.box:nth-child(1){animation-delay:.00s}.box:nth-child(2){animation-delay:.03s}.box:nth-child(3){animation-delay:.06s}
.box:nth-child(4){animation-delay:.09s}.box:nth-child(5){animation-delay:.12s}.box:nth-child(6){animation-delay:.15s}
.box:nth-child(7){animation-delay:.18s}.box:nth-child(8){animation-delay:.21s}.box:nth-child(n+9){animation-delay:.24s}
.box-line{width:18px;height:1px;margin-bottom:16px;transition:width 0.28s cubic-bezier(0.16,1,0.3,1);}
.box:hover .box-line{width:34px;}
.box-name{font-family:var(--font-display);font-size:22px;font-weight:300;line-height:1.2;margin-bottom:8px;}
.box-count{font-family:var(--font-mono);font-size:9px;letter-spacing:0.1em;color:var(--text-dim);text-transform:uppercase;}
.box-enter{position:absolute;bottom:16px;right:16px;font-size:11px;color:var(--text-dim);opacity:0;transform:translateX(-6px);transition:opacity 0.2s,transform 0.2s cubic-bezier(0.16,1,0.3,1);}
.box:hover .box-enter{opacity:1;transform:translateX(0);}

/* ── DIVIDER ── */
.section-div{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.section-div-label{font-family:var(--font-mono);font-size:9px;letter-spacing:0.16em;color:var(--text-mid);text-transform:uppercase;white-space:nowrap;}
.section-div-line{flex:1;height:1px;background:var(--border);}

/* ── ITEM CARDS ── */
.items-grid{display:flex;flex-direction:column;gap:6px;width:100%;}
.item-card{
  background:var(--s1);border:1px solid var(--border);border-left:3px solid transparent;
  border-radius:3px;padding:10px 14px;cursor:default;
  transition:background 0.15s,border-color 0.15s;
  animation:itemIn 0.28s cubic-bezier(0.16,1,0.3,1) both;
}
.item-card:hover{background:var(--s2);}
@keyframes itemIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
.item-card:nth-child(1){animation-delay:.00s}.item-card:nth-child(2){animation-delay:.02s}
.item-card:nth-child(3){animation-delay:.04s}.item-card:nth-child(4){animation-delay:.06s}
.item-card:nth-child(5){animation-delay:.08s}.item-card:nth-child(n+6){animation-delay:.10s}

/* Row 1: name left, price right */
.item-row1{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:4px;}
.item-name-primary{font-family:var(--font-ui);font-size:13px;font-weight:600;color:var(--text);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-name-secondary{font-family:var(--font-ui);font-size:12px;font-weight:300;font-style:italic;color:var(--text-mid);margin-left:4px;}
.item-price{font-family:var(--font-mono);font-size:11px;font-weight:500;color:var(--text);letter-spacing:0.02em;white-space:nowrap;flex-shrink:0;}
.item-price-label{font-size:9px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);margin-right:3px;}

/* Row 2: badge + pills left, notes right */
.item-row2{display:flex;align-items:center;gap:8px;min-height:20px;overflow:hidden;}
.item-cat-badge{font-family:var(--font-ui);font-size:9px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:2px 7px;border-radius:2px;white-space:nowrap;flex-shrink:0;}
.item-meta-inline{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.item-pill{font-family:var(--font-ui);font-size:10px;font-weight:500;color:var(--text-mid);display:flex;align-items:center;gap:3px;white-space:nowrap;}
.pill-lbl{font-size:8px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);}
.item-notes-inline{font-family:var(--font-ui);font-size:10px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}

/* Indicators */
.item-indicators{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.indicator-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-ui);font-size:9px;font-weight:500;padding:1px 6px;border-radius:2px;border:1px solid;letter-spacing:0.03em;white-space:nowrap;}
.ind-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;}

/* ── SEARCH RESULTS ── */
.search-view{min-height:100%;padding:44px 60px 80px;display:flex;flex-direction:column;align-items:center;animation:fadeUp 0.24s cubic-bezier(0.16,1,0.3,1) both;}
.search-inner{width:100%;max-width:880px;}
.search-title{font-family:var(--font-display);font-size:48px;font-weight:300;color:var(--text);margin-bottom:8px;}
.search-meta{font-family:var(--font-mono);font-size:9px;letter-spacing:0.14em;color:var(--text-mid);text-transform:uppercase;margin-bottom:40px;}

/* Search result card */
.sr-card{
  background:var(--s1);border:1px solid var(--border);border-left:3px solid transparent;
  border-radius:3px;padding:10px 14px;margin-bottom:6px;cursor:default;
  transition:background 0.15s;animation:itemIn 0.28s cubic-bezier(0.16,1,0.3,1) both;
}
.sr-card:hover{background:var(--s2);}
.sr-card:nth-child(1){animation-delay:.00s}.sr-card:nth-child(2){animation-delay:.02s}
.sr-card:nth-child(3){animation-delay:.04s}.sr-card:nth-child(4){animation-delay:.06s}
.sr-card:nth-child(n+5){animation-delay:.08s}

/* Row 1: name + qty */
.sr-row1{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:4px;}
.sr-name-primary{font-family:var(--font-ui);font-size:13px;font-weight:600;color:var(--text);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sr-name-secondary{font-family:var(--font-ui);font-size:12px;font-weight:300;font-style:italic;color:var(--text-mid);margin-left:4px;}
.sr-qty{font-family:var(--font-mono);font-size:11px;font-weight:500;color:var(--text);letter-spacing:0.02em;white-space:nowrap;flex-shrink:0;}

/* Row 2: badge + loc path inline */
.sr-row2{display:flex;align-items:center;gap:8px;overflow:hidden;}
.sr-loc-path{display:flex;align-items:center;gap:4px;overflow:hidden;flex:1;}
.sr-loc-seg{
  font-family:var(--font-ui);font-size:10px;font-weight:500;
  color:var(--text-mid);cursor:pointer;white-space:nowrap;
  transition:color 0.15s;flex-shrink:1;overflow:hidden;text-overflow:ellipsis;
}
.sr-loc-seg:hover{color:var(--rose);}
.sr-loc-seg.leaf{color:var(--text);font-weight:600;flex-shrink:0;}
.sr-loc-sep{font-size:9px;color:var(--text-dim);flex-shrink:0;}
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="logo">Inventory</div>
    <input class="header-search" id="search-input" type="text" placeholder="search…" autocomplete="off">
    <div class="header-right">
      <div class="sync-pill"><div id="sync-dot" class="loading"></div><span id="sync-label">loading</span></div>
      <a class="editor-link" href="index.html">editor →</a>
    </div>
  </header>
  <div class="body">
    <div class="sidebar" id="sidebar">
      <div class="sb-all active" id="sb-all" onclick="navigate([])">
        <span>All Items</span>
        <span class="sb-all-count" id="sb-all-count"></span>
      </div>
      <div id="sb-tree"></div>
    </div>
    <div class="stage" id="stage">
      <div class="loading-state"><div class="loading-ring"></div><div class="loading-label">Loading</div></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://npdtjxjhepaqhrqtvueu.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5wZHRqeGpoZXBhcWhycXR2dWV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MDM1NjYsImV4cCI6MjA5MjQ3OTU2Nn0.7a1y4wBWOJ45Wc7bwJNMJ9L09-QijuG31jWlYANKam8';

let inventory=[], currentPath=[], expandedSb=new Set(), searchQuery='';
// Path registry — maps numeric IDs to path arrays to avoid JSON-in-HTML issues
const _paths={};let _pid=0;
function regPath(arr){const id='p'+(++_pid);_paths[id]=arr;return id;}
function nav(id){navigate(_paths[id]||[]);}

const DEPTH_HUES=[200,160,45,280,20,320];
function depthColor(d,a=1){const h=DEPTH_HUES[Math.min(d,DEPTH_HUES.length-1)];return`hsla(${h},65%,68%,${a})`;}

const CAT={
  'Electronics':              {bg:'#1a2635',text:'#90b8d8',border:'#2a3d52'},
  'Cables & Charging':        {bg:'#172030',text:'#7aa5c8',border:'#253248'},
  'Camera/Photo Gear':        {bg:'#221830',text:'#a888cc',border:'#36274a'},
  'Military':                 {bg:'#182318',text:'#7aaa6a',border:'#28382a'},
  'Firearms & Ammo':          {bg:'#2a1818',text:'#c08080',border:'#422828'},
  'Clothing':                 {bg:'#2a2010',text:'#c8a060',border:'#40300e'},
  'Footwear':                 {bg:'#221a10',text:'#b08848',border:'#38281a'},
  'Accessories':              {bg:'#252015',text:'#c0b060',border:'#3c3020'},
  'Tools & Hardware':         {bg:'#261a12',text:'#c08858',border:'#3e281e'},
  'Office Supplies':          {bg:'#1a2030',text:'#9ab0c8',border:'#283048'},
  'Bags & Carry':             {bg:'#182030',text:'#88a8c8',border:'#263248'},
  'Personal Care & Grooming': {bg:'#261820',text:'#c082a0',border:'#3e2832'},
  'Health & Supplements':     {bg:'#152a20',text:'#68b888',border:'#223a30'},
  'Cleaning & Home':          {bg:'#182528',text:'#80b0be',border:'#26383c'},
  'Furniture':                {bg:'#201a14',text:'#aa8868',border:'#322818'},
  'Identity Documents':       {bg:'#252218',text:'#c0b050',border:'#3a3420'},
  'Legal Documents':          {bg:'#222018',text:'#b8a048',border:'#363018'},
  'Vehicle Documents':        {bg:'#201c14',text:'#aa9868',border:'#302818'},
  'Military Documents':       {bg:'#182215',text:'#88aa58',border:'#283420'},
  'Financial Documents':      {bg:'#142520',text:'#58a888',border:'#203830'},
  'Books & Notebooks':        {bg:'#252218',text:'#c0a850',border:'#3a3420'},
  'Gym & Fitness':            {bg:'#152518',text:'#60c880',border:'#223c28'},
  'Automotive':               {bg:'#1e1e1a',text:'#909080',border:'#2e2e28'},
  'Misc':                     {bg:'#1a1a1a',text:'#888888',border:'#2a2a2a'},
};
function catC(cat){return CAT[cat]||CAT['Misc'];}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function stringToPath(str){if(!str||!str.trim())return[];return str.split('>').map(s=>s.trim()).filter(Boolean);}
function pathToString(p){return(p||[]).join(' > ');}
function pathStartsWith(path,prefix){if(!prefix||!prefix.length)return true;if(path.length<prefix.length)return false;return prefix.every((s,i)=>s===path[i]);}

// Split item name into primary (before dash) and secondary (brand/after dash)
function splitName(name){
  const m=name.match(/^(.+?)\s+-\s+(.+)$/);
  if(m)return{primary:m[1].trim(),secondary:m[2].trim()};
  return{primary:name,secondary:null};
}

function rowToItem(row){
  return{id:row.id,name:row.name||'',category:row.category||'Misc',
    notes:row.notes,qty:row.qty,condition:row.condition,keep:row.keep,
    yearPurchased:row.year_purchased,estValue:row.est_value,
    fillLevel:row.fill_level,digitalCopy:row.digital_copy,
    locationPath:stringToPath(row.location||'')};
}

function buildTree(){
  const root={children:{},total:0};
  inventory.forEach(item=>{
    let node=root;node.total++;
    (item.locationPath||[]).forEach(seg=>{
      if(!node.children[seg])node.children[seg]={children:{},total:0};
      node.children[seg].total++;node=node.children[seg];
    });
  });
  return root;
}

// ── SIDEBAR ──────────────────────────────────────────────────────────────────
function renderSidebar(){
  const tree=buildTree();
  document.getElementById('sb-all-count').textContent=tree.total;
  document.getElementById('sb-all').classList.toggle('active',!currentPath.length&&!searchQuery);
  const container=document.getElementById('sb-tree');container.innerHTML='';
  function rNode(children,parentPath,container,depth){
    Object.entries(children).sort((a,b)=>b[1].total-a[1].total).forEach(([name,node])=>{
      const path=[...parentPath,name];
      const pk=path.join('::');
      const hasChildren=Object.keys(node.children).length>0;
      const isExpanded=expandedSb.has(pk);
      const isActive=!searchQuery&&currentPath.join('::')=== pk;
      const d=Math.min(depth,5);
      const wrap=document.createElement('div');
      const row=document.createElement('div');
      row.className=`sb-row d${d}${isActive?' active':''}`;
      row.style.paddingLeft=(depth*12+8)+'px';
      const arrow=document.createElement('span');
      arrow.className=`sb-arrow${!hasChildren?' leaf':isExpanded?' open':''}`;
      arrow.textContent=hasChildren?'▶':'';
      arrow.onclick=e=>{e.stopPropagation();if(!hasChildren)return;if(isExpanded)expandedSb.delete(pk);else expandedSb.add(pk);renderSidebar();};
      const nameEl=document.createElement('span');nameEl.className='sb-name';nameEl.textContent=name;
      const countEl=document.createElement('span');countEl.className='sb-count';countEl.textContent=node.total;
      row.appendChild(arrow);row.appendChild(nameEl);row.appendChild(countEl);
      row.onclick=()=>navigate(path);wrap.appendChild(row);
      if(hasChildren&&isExpanded){
        const ch=document.createElement('div');ch.className='sb-children open';
        rNode(node.children,path,ch,depth+1);wrap.appendChild(ch);
      }
      container.appendChild(wrap);
    });
  }
  rNode(tree.children,[],container,0);
}

// ── NAVIGATE ─────────────────────────────────────────────────────────────────
function navigate(path){
  currentPath=path;searchQuery='';
  document.getElementById('search-input').value='';
  for(let i=1;i<=path.length;i++)expandedSb.add(path.slice(0,i).join('::'));
  renderSidebar();renderStage();
  document.getElementById('stage').scrollTo({top:0,behavior:'smooth'});
}

// ── RENDER STAGE ─────────────────────────────────────────────────────────────
function renderStage(){
  const stage=document.getElementById('stage');

  // Search mode
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    const results=inventory.filter(i=>
      i.name.toLowerCase().includes(q)||
      (i.notes||'').toLowerCase().includes(q)||
      (i.category||'').toLowerCase().includes(q)||
      pathToString(i.locationPath).toLowerCase().includes(q)
    );
    const cards=results.map(i=>searchCardHTML(i)).join('');
    stage.innerHTML=`<div class="search-view"><div class="search-inner">
      <div class="search-title">Search</div>
      <div class="search-meta">${results.length} result${results.length!==1?'s':''} · "${esc(searchQuery)}"</div>
      <div>${cards}</div>
    </div></div>`;
    return;
  }

  // Location mode
  const path=currentPath;
  const allItems=inventory.filter(i=>pathStartsWith(i.locationPath||[],path));
  const directItems=allItems.filter(i=>(i.locationPath||[]).length===path.length);
  const childMap={};
  allItems.forEach(item=>{
    const p=item.locationPath||[];
    if(p.length>path.length){const seg=p[path.length];if(!childMap[seg])childMap[seg]=0;childMap[seg]++;}
  });
  const children=Object.entries(childMap).sort((a,b)=>b[1]-a[1]);
  const title=path.length?path[path.length-1]:'All Items';
  const depth=path.length;
  const titleColor=path.length?depthColor(depth-1,1):'var(--text)';

  // Breadcrumb
  const bc=['All',...path].map((seg,i)=>{
    const isCurrent=i===path.length;
    const p=i===0?[]:path.slice(0,i).concat(seg);
    const pid=regPath(p);
    return`<span class="bc-item${isCurrent?' current':''}" onclick="nav('${pid}')">${esc(seg)}</span>${!isCurrent?'<span class="bc-sep">›</span>':''}`;
  }).join('');

  const backPath=path.slice(0,-1);
  const backPid=regPath(backPath);
  const backLabel=path.length>1?esc(path[path.length-2]):'All Items';
  const backBtn=path.length>0?`<button class="back-btn" onclick="nav('${backPid}')">
    <span class="back-arrow">←</span><span>${backLabel}</span>
  </button>`:
  `<button class="back-btn" style="opacity:0.35;pointer-events:none">
    <span class="back-arrow">←</span><span>All Items</span>
  </button>`;

  let html=`<div class="view"><div class="view-inner">
    <div class="breadcrumb">${bc}</div>
    ${backBtn}
    <div class="loc-title-wrap">
      <div class="loc-title" style="color:${titleColor}">${esc(title)}</div>
      <div class="loc-subtitle">
        <span>${allItems.length} item${allItems.length!==1?'s':''}</span>
        ${children.length?`<span>${children.length} location${children.length!==1?'s':''}</span>`:''}
      </div>
    </div>`;

  // Boxes
  if(children.length){
    const childColor=depthColor(depth,1);
    const childColorDim=depthColor(depth,0.35);
    html+=`<div class="boxes-wrap"><div class="boxes-grid">`;
    children.forEach(([name,count])=>{
      const childPath=[...path,name];
      const pid=regPath(childPath);
      html+=`<div class="box" onclick="nav('${pid}')">
        <div class="box-line" style="background:${childColorDim}"></div>
        <div class="box-name" style="color:${childColor}">${esc(name)}</div>
        <div class="box-count">${count} item${count!==1?'s':''}</div>
        <div class="box-enter">→</div>
      </div>`;
    });
    html+=`</div></div>`;
  }

  // Direct items
  if(directItems.length){
    html+=`<div class="section-div">
      <div class="section-div-label">Items${path.length?' here':''}</div>
      <div class="section-div-line"></div>
      <div class="section-div-label">${directItems.length}</div>
    </div>
    <div class="items-grid">${directItems.map(i=>itemCardHTML(i)).join('')}</div>`;
  }

  if(!children.length&&!directItems.length){
    html+=`<div style="text-align:center;padding:80px 0;font-family:var(--font-mono);font-size:9px;letter-spacing:0.18em;color:var(--text-dim);text-transform:uppercase">Empty</div>`;
  }
  html+=`</div></div>`;
  stage.innerHTML=html;
}

// ── ITEM CARD (location view) ─────────────────────────────────────────────────
function itemCardHTML(item){
  const cs=catC(item.category);
  const{primary,secondary}=splitName(item.name);
  const parts=[];
  if(item.condition)parts.push({l:'Cond',v:item.condition});
  if(item.keep&&item.keep!=='Keep')parts.push({l:'Keep',v:item.keep});
  if(item.qty&&item.qty!=='1')parts.push({l:'Qty',v:'\xd7'+item.qty});

  const rawNote=item.notes||'';
  const kwIdx=rawNote.toLowerCase().indexOf('| keywords:');
  const displayNote=kwIdx!==-1?rawNote.slice(0,kwIdx).trim():rawNote;

  const fillMap={'Full':{label:'Full',color:'#4d8f6a'},'Most':{label:'Most',color:'#7a9e64'},'Half':{label:'Half',color:'#9e7a32'},'Low':{label:'Low',color:'#8f5530'},'Empty':{label:'Empty',color:'#8f3838'}};
  const fillInfo=item.fillLevel?fillMap[item.fillLevel]:null;
  const fillBadge=fillInfo?`<span class="indicator-badge" style="color:${fillInfo.color};border-color:${fillInfo.color}40"><span class="ind-dot" style="background:${fillInfo.color}"></span>${fillInfo.label}</span>`:'';
  const digitalBadge=item.digitalCopy?`<span class="indicator-badge" style="color:#6e8fa8;border-color:#6e8fa840"><span class="ind-dot" style="background:#6e8fa8"></span>Digital</span>`:'';

  return`<div class="item-card" style="border-left-color:${cs.text};background:${cs.bg};border-color:${cs.border}">
    <div class="item-row1">
      <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">
        <span class="item-name-primary">${esc(primary)}</span>${secondary?`<span class="item-name-secondary"> — ${esc(secondary)}</span>`:''}
      </div>
      ${item.estValue?`<span class="item-price"><span class="item-price-label">est.</span>$${esc(item.estValue)}</span>`:''}
    </div>
    <div class="item-row2">
      <span class="item-cat-badge" style="background:rgba(0,0,0,0.3);color:${cs.text}">${esc(item.category)}</span>
      ${parts.length?`<div class="item-meta-inline">${parts.map(p=>`<span class="item-pill"><span class="pill-lbl">${p.l}</span>${esc(p.v)}</span>`).join('')}</div>`:''}
      ${fillBadge||digitalBadge?`<div class="item-indicators">${fillBadge}${digitalBadge}</div>`:''}
      ${displayNote?`<span class="item-notes-inline">${esc(displayNote)}</span>`:''}
    </div>
  </div>`;
}

// ── SEARCH RESULT CARD ────────────────────────────────────────────────────────
function searchCardHTML(item){
  const cs=catC(item.category);
  const{primary,secondary}=splitName(item.name);
  const path=item.locationPath||[];

  // Compact inline location path — each segment clickable
  let locPath='';
  if(path.length){
    locPath='<div class="sr-loc-path">';
    path.forEach((seg,i)=>{
      const isLeaf=i===path.length-1;
      const pid=regPath(path.slice(0,i+1));
      locPath+=`<span class="sr-loc-seg${isLeaf?' leaf':''}" onclick="nav('${pid}')">${esc(seg)}</span>`;
      if(!isLeaf)locPath+=`<span class="sr-loc-sep">›</span>`;
    });
    locPath+='</div>';
  }

  const qty=item.qty&&item.qty!=='1'?`<span class="sr-qty">×${esc(item.qty)}</span>`:'';

  return`<div class="sr-card" style="border-left-color:${cs.text};background:${cs.bg};border-color:${cs.border}">
    <div class="sr-row1">
      <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">
        <span class="sr-name-primary">${esc(primary)}</span>${secondary?`<span class="sr-name-secondary"> — ${esc(secondary)}</span>`:''}
      </div>
      ${qty}
    </div>
    <div class="sr-row2">
      <span class="item-cat-badge" style="background:rgba(0,0,0,0.3);color:${cs.text};flex-shrink:0">${esc(item.category)}</span>
      ${locPath}
    </div>
  </div>`;
}

// Search
document.getElementById('search-input').addEventListener('input',e=>{
  searchQuery=e.target.value.trim();renderSidebar();renderStage();
  document.getElementById('stage').scrollTo({top:0});
});

// Load
async function load(){
  setSyncStatus('loading');
  try{
    let all=[],from=0,page=1000;
    while(true){
      const res=await fetch(`${SUPABASE_URL}/rest/v1/inventory?select=*&order=name.asc&offset=${from}&limit=${page}`,{
        headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Range':`${from}-${from+page-1}`}
      });
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      const rows=await res.json();
      all=all.concat(rows.map(rowToItem));
      if(rows.length<page)break;from+=page;
    }
    inventory=all;setSyncStatus('ok');renderSidebar();renderStage();
  }catch(err){
    setSyncStatus('error');
    document.getElementById('stage').innerHTML=`<div class="loading-state"><div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;color:var(--text-dim)">Failed — ${esc(err.message)}</div></div>`;
  }
}
function setSyncStatus(s){
  document.getElementById('sync-dot').className=s==='ok'?'ok':s==='loading'?'loading':'';
  document.getElementById('sync-label').textContent=s==='ok'?`${inventory.length} items`:s==='loading'?'loading':'error';
}
load();
</script>
