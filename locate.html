<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Locate — Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #090909;
  --s1:       #111111;
  --s2:       #181818;
  --s3:       #202020;
  --border:   #252525;
  --border2:  #333333;

  --text:     #f0f0f0;
  --text-mid: #888;
  --text-dim: #444;

  --rose:     #b07a84;
  --green:    #4d8f6a;
  --amber:    #9e7a32;

  --score-green:  #4d8f6a;
  --score-yellow: #9e7a32;
  --score-orange: #8f5530;
  --score-red:    #8f3838;

  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-mono:    'DM Mono', monospace;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

.shell {
  display: grid;
  grid-template-rows: 52px 1fr;
  height: 100vh;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  padding: 0 32px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: relative;
  z-index: 100;
  gap: 20px;
}
.logo {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.28em;
  color: var(--text-dim);
  text-transform: uppercase;
  flex-shrink: 0;
}
.header-search {
  flex: 1;
  max-width: 360px;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--border);
  padding: 6px 0;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 11px;
  outline: none;
  letter-spacing: 0.04em;
  transition: border-color 0.2s;
}
.header-search:focus { border-bottom-color: var(--rose); }
.header-search::placeholder { color: var(--text-dim); }
.header-meta {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 20px;
}
.sync-text {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 6px;
}
#sync-dot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--text-dim);
  transition: background 0.4s;
}
#sync-dot.ok { background: var(--green); }
#sync-dot.loading { background: var(--amber); animation: blink 1s ease infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.editor-link {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--text-dim);
  text-decoration: none;
  text-transform: uppercase;
  transition: color 0.15s;
}
.editor-link:hover { color: var(--text-mid); }

/* ── BODY ── */
.body {
  display: grid;
  grid-template-columns: 200px 1fr;
  height: calc(100vh - 52px);
  overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 24px 0;
  background: var(--bg);
  scrollbar-width: none;
}
.sidebar::-webkit-scrollbar { display: none; }

.sb-all {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 20px;
  cursor: pointer;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  transition: color 0.15s;
  margin-bottom: 8px;
}
.sb-all:hover { color: var(--text-mid); }
.sb-all.active { color: var(--rose); }

.sb-row {
  display: flex;
  align-items: center;
  padding: 5px 20px 5px 0;
  cursor: pointer;
  transition: opacity 0.15s;
  border-left: 1px solid transparent;
}
.sb-row.active { border-left-color: currentColor; }

.sb-arrow {
  width: 20px;
  flex-shrink: 0;
  font-size: 7px;
  color: var(--text-dim);
  text-align: center;
  transition: transform 0.2s;
  cursor: pointer;
}
.sb-arrow.open { transform: rotate(90deg); }
.sb-name {
  flex: 1;
  font-size: 10px;
  letter-spacing: 0.04em;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  transition: color 0.15s;
}
.sb-count {
  font-size: 9px;
  color: var(--text-dim);
  padding-right: 20px;
  flex-shrink: 0;
}
.sb-children { display: none; border-left: 1px solid var(--border); margin-left: 20px; }
.sb-children.open { display: block; }

/* depth colors */
.d0 .sb-name { color: hsla(200,65%,68%,0.55); }
.d0.sb-row.active .sb-name { color: hsla(200,65%,68%,1); }
.d1 .sb-name { color: hsla(160,65%,65%,0.5); }
.d1.sb-row.active .sb-name { color: hsla(160,65%,65%,1); }
.d2 .sb-name { color: hsla(45,70%,65%,0.45); }
.d2.sb-row.active .sb-name { color: hsla(45,70%,65%,1); }
.d3 .sb-name { color: hsla(280,60%,68%,0.45); }
.d3.sb-row.active .sb-name { color: hsla(280,60%,68%,1); }
.d4 .sb-name { color: hsla(20,65%,65%,0.45); }
.d4.sb-row.active .sb-name { color: hsla(20,65%,65%,1); }
.d5 .sb-name { color: hsla(320,60%,65%,0.45); }
.d5.sb-row.active .sb-name { color: hsla(320,60%,65%,1); }

/* ── STAGE ── */
.stage {
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: none;
}
.stage::-webkit-scrollbar { display: none; }

/* ── LOADING ── */
.loading-state {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  flex-direction: column;
  gap: 16px;
}
.loading-ring {
  width: 28px; height: 28px;
  border: 1px solid var(--border2);
  border-top-color: var(--rose);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-label {
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--text-dim);
  text-transform: uppercase;
}

/* ── VIEW ── */
.view {
  min-height: 100%;
  padding: 52px 72px 80px;
  animation: fadeUp 0.28s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── BREADCRUMB ── */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 44px;
  flex-wrap: wrap;
}
.bc-item {
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  cursor: pointer;
  transition: color 0.15s;
}
.bc-item:hover { color: var(--text-mid); }
.bc-item.current { color: var(--text-mid); cursor: default; }
.bc-sep { color: var(--border2); font-size: 9px; }

/* ── TITLE ── */
.loc-title-wrap {
  margin-bottom: 60px;
  text-align: center;
}
.loc-title {
  font-family: var(--font-display);
  font-size: clamp(40px, 5.5vw, 72px);
  font-weight: 300;
  letter-spacing: 0.01em;
  line-height: 1.05;
  margin-bottom: 14px;
}
.loc-subtitle {
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--text-dim);
  text-transform: uppercase;
  display: flex;
  justify-content: center;
  gap: 28px;
}

/* ── BOXES ── */
.boxes-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 60px;
}

.box {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 28px 22px 22px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition:
    transform 0.3s cubic-bezier(0.16,1,0.3,1),
    background 0.2s,
    border-color 0.2s,
    box-shadow 0.3s cubic-bezier(0.16,1,0.3,1);
  animation: boxIn 0.35s cubic-bezier(0.16,1,0.3,1) both;
}
.box::after {
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.05),transparent);
}
.box:hover {
  transform: translateY(-4px);
  background: var(--s2);
  border-color: var(--border2);
  box-shadow: 0 16px 48px rgba(0,0,0,0.55);
}
.box:active { transform: translateY(-1px); transition-duration: 0.08s; }

@keyframes boxIn {
  from { opacity:0; transform:translateY(14px) scale(0.985); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}
.box:nth-child(1){animation-delay:0.00s}
.box:nth-child(2){animation-delay:0.03s}
.box:nth-child(3){animation-delay:0.06s}
.box:nth-child(4){animation-delay:0.09s}
.box:nth-child(5){animation-delay:0.12s}
.box:nth-child(6){animation-delay:0.15s}
.box:nth-child(7){animation-delay:0.18s}
.box:nth-child(8){animation-delay:0.21s}
.box:nth-child(9){animation-delay:0.24s}
.box:nth-child(10){animation-delay:0.27s}
.box:nth-child(n+11){animation-delay:0.30s}

.box-line {
  width: 18px; height: 1px;
  margin-bottom: 18px;
  transition: width 0.3s cubic-bezier(0.16,1,0.3,1);
}
.box:hover .box-line { width: 32px; }

.box-name {
  font-family: var(--font-display);
  font-size: 21px;
  font-weight: 300;
  letter-spacing: 0.01em;
  line-height: 1.2;
  margin-bottom: 10px;
}
.box-count {
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  text-transform: uppercase;
}
.box-enter {
  position: absolute;
  bottom: 18px; right: 18px;
  font-size: 10px;
  color: var(--text-dim);
  opacity: 0;
  transform: translateX(-8px);
  transition: opacity 0.2s, transform 0.2s cubic-bezier(0.16,1,0.3,1);
}
.box:hover .box-enter { opacity: 1; transform: translateX(0); }

/* ── DIVIDER ── */
.section-div {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}
.section-div-label {
  font-size: 9px;
  letter-spacing: 0.16em;
  color: var(--text-dim);
  text-transform: uppercase;
  white-space: nowrap;
}
.section-div-line { flex:1; height:1px; background:var(--border); }

/* ── ITEMS ── */
.items-grid { display:flex; flex-direction:column; gap:1px; }

.item-card {
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  align-items: center;
  gap: 20px;
  padding: 15px 18px;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 2px;
  cursor: default;
  transition: background 0.15s, border-color 0.15s;
  animation: itemIn 0.3s cubic-bezier(0.16,1,0.3,1) both;
}
.item-card:hover { background:var(--s2); border-color:var(--border2); }
@keyframes itemIn {
  from { opacity:0; transform:translateX(-6px); }
  to   { opacity:1; transform:translateX(0); }
}
.item-card:nth-child(1){animation-delay:0.00s}
.item-card:nth-child(2){animation-delay:0.02s}
.item-card:nth-child(3){animation-delay:0.04s}
.item-card:nth-child(4){animation-delay:0.06s}
.item-card:nth-child(5){animation-delay:0.08s}
.item-card:nth-child(6){animation-delay:0.10s}
.item-card:nth-child(7){animation-delay:0.12s}
.item-card:nth-child(8){animation-delay:0.14s}
.item-card:nth-child(n+9){animation-delay:0.16s}

.item-name {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 300;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 2px;
}
.item-sub {
  font-size: 9px;
  letter-spacing: 0.05em;
  color: var(--text-dim);
}
.item-cat {
  font-size: 8px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 2px;
  white-space: nowrap;
  flex-shrink: 0;
}
.item-val {
  font-size: 10px;
  color: var(--text-dim);
  min-width: 44px;
  text-align: right;
  flex-shrink: 0;
}
.item-score {
  font-size: 11px;
  font-weight: 500;
  min-width: 24px;
  text-align: right;
  flex-shrink: 0;
}

/* ── SEARCH ── */
.search-title {
  font-family: var(--font-display);
  font-size: 48px;
  font-weight: 300;
  color: var(--text);
  margin-bottom: 8px;
}
.search-meta {
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 44px;
}

/* ── NOTES POPUP ── */
.notes-popup {
  position: fixed;
  z-index: 9999;
  background: var(--s2);
  border: 1px solid var(--border2);
  border-radius: 2px;
  padding: 12px 16px;
  max-width: 280px;
  font-size: 11px;
  line-height: 1.7;
  color: var(--text-mid);
  letter-spacing: 0.03em;
  box-shadow: 0 16px 48px rgba(0,0,0,0.7);
  pointer-events: none;
  word-break: break-word;
  white-space: normal;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.06s ease, transform 0.06s ease;
}
.notes-popup.visible { opacity:1; transform:translateY(0); }
</style>
</head>

<script>
const SUPABASE_URL = 'https://npdtjxjhepaqhrqtvueu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5wZHRqeGpoZXBhcWhycXR2dWV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MDM1NjYsImV4cCI6MjA5MjQ3OTU2Nn0.7a1y4wBWOJ45Wc7bwJNMJ9L09-QijuG31jWlYANKam8';

let inventory=[], currentPath=[], expandedSb=new Set(), searchQuery='';

const DEPTH_HUES=[200,160,45,280,20,320];
function depthColor(d,a=1){const h=DEPTH_HUES[Math.min(d,DEPTH_HUES.length-1)];return `hsla(${h},65%,67%,${a})`;}

const CAT={
  'Electronics':{bg:'rgba(90,130,170,0.12)',color:'#7a9db8'},
  'Cables & Charging':{bg:'rgba(75,115,155,0.12)',color:'#6e92b0'},
  'Camera/Photo Gear':{bg:'rgba(130,90,165,0.12)',color:'#9e7ab8'},
  'Military':{bg:'rgba(95,135,75,0.12)',color:'#7a9e64'},
  'Firearms & Ammo':{bg:'rgba(160,80,80,0.12)',color:'#a86868'},

  'Cleaning & Home':{bg:'rgba(110,165,185,0.12)',color:'#7aaeba'},

  'Identity Documents':{bg:'rgba(175,160,70,0.12)',color:'#b8a848'},

  'Vehicle Documents':{bg:'rgba(145,120,85,0.12)',color:'#9a8868'},

  'Financial Documents':{bg:'rgba(65,145,120,0.12)',color:'#509e88'},
  'Books & Notebooks':{bg:'rgba(170,155,80,0.12)',color:'#b4a458'},
  'Gym & Fitness':{bg:'rgba(70,175,115,0.12)',color:'#50b880'},

};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function stringToPath(str){if(!str||!str.trim())return[];return str.split('>').map(s=>s.trim()).filter(Boolean);}
function pathToString(p){return(p||[]).join(' > ');}
function pathStartsWith(path,prefix){if(!prefix||!prefix.length)return true;if(path.length<prefix.length)return false;return prefix.every((s,i)=>s===path[i]);}

const CUR_YEAR=new Date().getFullYear();
function calcScore(item){
  const f={'Daily':5,'Weekly':4,'Monthly':3,'Rarely':2,'Never':1}[item.frequency]||3;
  const c={'Essential':5,'Important':4,'Nice to Have':2,'Redundant':1}[item.criticality]||3;
  const r={'Irreplaceable':5,'Hard/Expensive':4,'Moderate':3,'Easy/Cheap':1}[item.replaceability]||3;
  const m={'New':1.0,'Good':0.95,'Fair':0.80,'Poor':0.60}[item.condition]||0.9;
  let s=Math.round(((f*0.25)+(c*0.40)+(r*0.35))/5*100*m);
  if(item.lastUsed){const[mu,yu]=item.lastUsed.split('/');const mo=(CUR_YEAR-parseInt(yu))*12+(new Date().getMonth()+1-parseInt(mu));if(mo<=6)s+=5;else if(mo<=24)s-=5;else s-=10;}
  if(item.yearPurchased){const age=CUR_YEAR-parseInt(item.yearPurchased);if(age>=10&&item.criticality!=='Essential')s-=5;}
  if(['Sell','Donate','Trash'].includes(item.keep))s=Math.min(s,20);
  return Math.max(0,Math.min(100,s));
}
function scoreColor(s){return s>=80?'var(--score-green)':s>=50?'var(--score-yellow)':s>=20?'var(--score-orange)':'var(--score-red)';}

function rowToItem(row){
  return{id:row.id,name:row.name||'',sn:row.sn,category:row.category||'Misc',
    notes:row.notes,qty:row.qty,frequency:row.frequency,criticality:row.criticality,
    replaceability:row.replaceability,condition:row.condition,keep:row.keep,
    yearPurchased:row.year_purchased,lastUsed:row.last_used,estValue:row.est_value,
    misplaced:row.misplaced,locationPath:stringToPath(row.location||'')};
}

function buildTree(){
  const root={children:{},total:0};
  inventory.forEach(item=>{
    let node=root;node.total++;
    (item.locationPath||[]).forEach(seg=>{
      if(!node.children[seg])node.children[seg]={children:{},total:0};
      node.children[seg].total++;node=node.children[seg];
    });
  });
  return root;
}

function renderSidebar(){
  const tree=buildTree();
  document.getElementById('sb-all-count').textContent=tree.total;
  document.getElementById('sb-all').classList.toggle('active',currentPath.length===0&&!searchQuery);
  const container=document.getElementById('sb-tree');
  container.innerHTML='';
  function rNode(children,parentPath,container,depth){
    Object.entries(children).sort((a,b)=>b[1].total-a[1].total).forEach(([name,node])=>{
      const path=[...parentPath,name];
      const pk=path.join('::');
      const hasChildren=Object.keys(node.children).length>0;
      const isExpanded=expandedSb.has(pk);
      const isActive=!searchQuery&&currentPath.join('::')=== pk;
      const d=Math.min(depth,5);
      const wrap=document.createElement('div');
      const row=document.createElement('div');
      row.className=`sb-row d${d}${isActive?' active':''}`;
      row.style.paddingLeft=(depth*10+10)+'px';
      const arrow=document.createElement('span');
      arrow.className=`sb-arrow${!hasChildren?' leaf':isExpanded?' open':''}`;
      arrow.textContent=hasChildren?'▶':'';
      arrow.onclick=e=>{e.stopPropagation();if(!hasChildren)return;if(isExpanded)expandedSb.delete(pk);else expandedSb.add(pk);renderSidebar();};
      const nameEl=document.createElement('span');nameEl.className='sb-name';nameEl.textContent=name;
      const countEl=document.createElement('span');countEl.className='sb-count';countEl.textContent=node.total;
      row.appendChild(arrow);row.appendChild(nameEl);row.appendChild(countEl);
      row.onclick=()=>navigate(path);
      wrap.appendChild(row);
      if(hasChildren&&isExpanded){
        const ch=document.createElement('div');ch.className='sb-children open';
        rNode(node.children,path,ch,depth+1);wrap.appendChild(ch);
      }
      container.appendChild(wrap);
    });
  }
  rNode(tree.children,[],container,0);
}

function navigate(path){
  currentPath=path;searchQuery='';
  document.getElementById('search-input').value='';
  for(let i=1;i<=path.length;i++)expandedSb.add(path.slice(0,i).join('::'));
  renderSidebar();renderStage();
  document.getElementById('stage').scrollTo({top:0,behavior:'smooth'});
}

function renderStage(){
  const stage=document.getElementById('stage');
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    const results=inventory.filter(i=>
      i.name.toLowerCase().includes(q)||
      (i.notes||'').toLowerCase().includes(q)||
      (i.category||'').toLowerCase().includes(q)||
      pathToString(i.locationPath).toLowerCase().includes(q)||
      (i.sn||'').toLowerCase().includes(q)
    );
    stage.innerHTML=`<div class="view">
      <div class="search-title">Search</div>
      <div class="search-meta">${results.length} result${results.length!==1?'s':''} &nbsp;·&nbsp; &ldquo;${esc(searchQuery)}&rdquo;</div>
      <div class="items-grid">${results.map(i=>itemHTML(i,true)).join('')}</div>
    </div>`;
    return;
  }
  const path=currentPath;
  const allItems=inventory.filter(i=>pathStartsWith(i.locationPath||[],path));
  const directItems=allItems.filter(i=>(i.locationPath||[]).length===path.length);
  const childMap={};
  allItems.forEach(item=>{
    const p=item.locationPath||[];
    if(p.length>path.length){const seg=p[path.length];if(!childMap[seg])childMap[seg]=0;childMap[seg]++;}
  });
  const children=Object.entries(childMap).sort((a,b)=>b[1]-a[1]);
  const title=path.length?path[path.length-1]:'All Items';
  const depth=path.length;
  const titleColor=path.length?depthColor(depth-1,1):'var(--text)';
  const avgScore=allItems.length?Math.round(allItems.map(calcScore).reduce((a,b)=>a+b,0)/allItems.length):0;

  // Breadcrumb
  const bc=['All',...path].map((seg,i)=>{
    const isCurrent=i===path.length;
    const p=i===0?[]:path.slice(0,i).concat(seg);
    return `<span class="bc-item${isCurrent?' current':''}" onclick="navigate(${JSON.stringify(i===0?[]:p)})">${esc(seg)}</span>${!isCurrent?'<span class="bc-sep">›</span>':''}`;
  }).join('');

  let html=`<div class="view">
    <div class="breadcrumb">${bc}</div>
    <div class="loc-title-wrap">
      <div class="loc-title" style="color:${titleColor}">${esc(title)}</div>
      <div class="loc-subtitle">
        <span>${allItems.length} item${allItems.length!==1?'s':''}</span>
        ${children.length?`<span>${children.length} location${children.length!==1?'s':''}</span>`:''}
        ${allItems.length?`<span>avg score ${avgScore}</span>`:''}
      </div>
    </div>`;

  if(children.length){
    html+=`<div class="boxes-grid">`;
    children.forEach(([name,count])=>{
      const childPath=[...path,name];
      const color=depthColor(depth,1);
      const colorDim=depthColor(depth,0.35);
      html+=`<div class="box" onclick="navigate(${JSON.stringify(childPath)})">
        <div class="box-line" style="background:${colorDim}"></div>
        <div class="box-name" style="color:${color}">${esc(name)}</div>
        <div class="box-count">${count} item${count!==1?'s':''}</div>
        <div class="box-enter">→</div>
      </div>`;
    });
    html+=`</div>`;
  }

  if(directItems.length){
    html+=`<div class="section-div">
      <div class="section-div-label">Items${path.length?` here`:''}</div>
      <div class="section-div-line"></div>
      <div class="section-div-label">${directItems.length}</div>
    </div>
    <div class="items-grid">${directItems.map(i=>itemHTML(i,false)).join('')}</div>`;
  }

  if(!children.length&&!directItems.length){
    html+=`<div style="text-align:center;padding:80px 0;font-size:9px;letter-spacing:0.18em;color:var(--text-dim);text-transform:uppercase">Empty</div>`;
  }

  html+=`</div>`;
  stage.innerHTML=html;
}

function itemHTML(item,showLoc){
  const score=calcScore(item);
  const sc=scoreColor(score);
  const cat=CAT[item.category]||CAT['Misc'];
  const parts=[item.qty&&item.qty!=='1'?`× ${item.qty}`:null,item.condition,item.keep].filter(Boolean);
  const sub=parts.join(' · ');
  const noteAttr=item.notes?`data-note="${esc(item.notes)}"` :'';
  return `<div class="item-card" ${noteAttr}>
    <div>
      <div class="item-name">${esc(item.name)}</div>
      ${sub||showLoc?`<div class="item-sub">${sub}${showLoc&&item.locationPath.length?` &nbsp;·&nbsp; ${esc(pathToString(item.locationPath))}`:''}</div>`:''}
    </div>
    <span class="item-cat" style="background:${cat.bg};color:${cat.color}">${esc(item.category)}</span>
    <span class="item-val">${item.estValue?'$'+item.estValue:''}</span>
    <span class="item-score" style="color:${sc}">${score}</span>
  </div>`;
}

// Notes popup
(function(){
  const popup=document.getElementById('notes-popup');
  let hide=null;
  document.addEventListener('mouseover',e=>{
    const row=e.target.closest('[data-note]');if(!row)return;
    clearTimeout(hide);popup.textContent=row.dataset.note;pos(e);popup.classList.add('visible');
  });
  document.addEventListener('mousemove',e=>{if(popup.classList.contains('visible')&&e.target.closest('[data-note]'))pos(e);});
  document.addEventListener('mouseout',e=>{if(e.target.closest('[data-note]'))hide=setTimeout(()=>popup.classList.remove('visible'),60);});
  function pos(e){
    let x=e.clientX-294,y=e.clientY-16;
    if(x<8)x=e.clientX+14;
    if(y+100>window.innerHeight-8)y=window.innerHeight-108;
    if(y<8)y=8;
    popup.style.left=x+'px';popup.style.top=y+'px';
  }
})();

// Search
document.getElementById('search-input').addEventListener('input',e=>{
  searchQuery=e.target.value.trim();renderSidebar();renderStage();
  document.getElementById('stage').scrollTo({top:0});
});

// Load
async function load(){
  setSyncStatus('loading');
  try{
    let all=[],from=0,page=1000;
    while(true){
      const res=await fetch(`${SUPABASE_URL}/rest/v1/inventory?select=*&order=name.asc&offset=${from}&limit=${page}`,{
        headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Range':`${from}-${from+page-1}`}
      });
      if(!res.ok)throw new Error(`HTTP ${res.status}`);
      const rows=await res.json();
      all=all.concat(rows.map(rowToItem));
      if(rows.length<page)break;
      from+=page;
    }
    inventory=all;setSyncStatus('ok');renderSidebar();renderStage();
  }catch(err){
    setSyncStatus('error');
    document.getElementById('stage').innerHTML=`<div class="loading-state"><div style="font-size:10px;letter-spacing:0.1em;color:var(--text-dim)">Failed — ${esc(err.message)}</div></div>`;
  }
}

function setSyncStatus(s){
  const dot=document.getElementById('sync-dot');
  const label=document.getElementById('sync-label');
  dot.className=s==='ok'?'ok':s==='loading'?'loading':'';
  label.textContent=s==='ok'?`${inventory.length} items`:s==='loading'?'loading':'error';
}

load();
</script>

</html>
