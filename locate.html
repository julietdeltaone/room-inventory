<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Locate — Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0c0c0e;
  --surface:   #141416;
  --raised:    #1a1a1d;
  --border:    #252528;
  --border2:   #303035;

  --text:      #eeeef0;
  --text-mid:  #8a8a94;
  --text-dim:  #44444e;

  --rose:      #b07a84;
  --green:     #4d8f6a;
  --amber:     #9e7a32;
  --steel:     #6e8fa8;

  --score-green:  #4d8f6a;
  --score-yellow: #9e7a32;
  --score-orange: #8f5530;
  --score-red:    #8f3838;

  --radius:    8px;
  --font-body: 'Sora', sans-serif;
  --font-mono: 'DM Mono', monospace;

  /* Depth colors — same system as editor */
  --d0: hsla(200, 72%, 68%, 1);
  --d1: hsla(160, 72%, 68%, 1);
  --d2: hsla(45,  72%, 68%, 1);
  --d3: hsla(280, 72%, 68%, 1);
  --d4: hsla(20,  72%, 68%, 1);
  --d5: hsla(320, 72%, 68%, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── LAYOUT ── */
.layout {
  display: grid;
  grid-template-rows: 56px 1fr;
  height: 100vh;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  gap: 16px;
}

.logo {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.22em;
  color: var(--rose);
  text-transform: uppercase;
  white-space: nowrap;
}

.header-search {
  flex: 1;
  max-width: 420px;
  background: var(--raised);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 8px 14px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
.header-search:focus { border-color: var(--rose); }
.header-search::placeholder { color: var(--text-dim); }

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.edit-link {
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-mid);
  text-decoration: none;
  padding: 6px 14px;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  transition: all 0.15s;
  white-space: nowrap;
}
.edit-link:hover { color: var(--text); border-color: var(--rose); }

.sync-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 20px;
  background: var(--raised);
  border: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-mid);
}
#sync-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--text-dim);
  transition: background 0.4s;
}
#sync-dot.ok { background: var(--green); }
#sync-dot.loading { background: var(--amber); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── MAIN BODY ── */
.body {
  display: grid;
  grid-template-columns: 320px 1fr;
  height: calc(100vh - 56px);
  overflow: hidden;
}

/* ── TREE PANEL ── */
.tree-panel {
  border-right: 1px solid var(--border);
  overflow-y: auto;
  background: var(--surface);
  padding: 16px 0;
}

.tree-panel::-webkit-scrollbar { width: 3px; }
.tree-panel::-webkit-scrollbar-track { background: transparent; }
.tree-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.tree-section-label {
  font-family: var(--font-body);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 0 20px 8px;
}

.tree-all {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.12s;
  margin-bottom: 4px;
}
.tree-all:hover { background: var(--raised); }
.tree-all.active { border-left-color: var(--rose); background: rgba(176,122,132,0.07); }
.tree-all-label {
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
}
.tree-all.active .tree-all-label { color: var(--rose); }
.tree-all-count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
}

/* ── TREE NODE ── */
.node-wrap { }

.node-row {
  display: flex;
  align-items: center;
  gap: 0;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background 0.1s, border-color 0.1s;
  user-select: none;
  position: relative;
}
.node-row:hover { background: var(--raised); }

.node-expand {
  width: 36px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 10px;
  color: var(--text-dim);
  transition: transform 0.2s, color 0.1s;
}
.node-expand.open { transform: rotate(90deg); color: var(--text-mid); }
.node-expand.leaf { opacity: 0; pointer-events: none; }

.node-label {
  flex: 1;
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 400;
  padding: 12px 0;
  padding-right: 16px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color 0.1s;
}

.node-count {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
  padding-right: 20px;
  flex-shrink: 0;
}

.node-children {
  display: none;
  border-left: 1px solid var(--border);
  margin-left: 18px;
}
.node-children.open { display: block; }

/* Depth color classes */
.depth-0 .node-label { color: hsla(200, 72%, 68%, 0.92); }
.depth-0.node-row { border-left-color: hsla(200, 72%, 68%, 0.3); }
.depth-0.node-row:hover, .depth-0.node-row.active { border-left-color: hsla(200, 72%, 68%, 1); background: hsla(200, 55%, 55%, 0.08); }
.depth-0.node-row.active .node-label { color: hsla(200, 72%, 68%, 1); }

.depth-1 .node-label { color: hsla(160, 72%, 68%, 0.92); }
.depth-1.node-row { border-left-color: hsla(160, 72%, 68%, 0.3); }
.depth-1.node-row:hover, .depth-1.node-row.active { border-left-color: hsla(160, 72%, 68%, 1); background: hsla(160, 55%, 55%, 0.08); }
.depth-1.node-row.active .node-label { color: hsla(160, 72%, 68%, 1); }

.depth-2 .node-label { color: hsla(45, 72%, 68%, 0.92); }
.depth-2.node-row { border-left-color: hsla(45, 72%, 68%, 0.3); }
.depth-2.node-row:hover, .depth-2.node-row.active { border-left-color: hsla(45, 72%, 68%, 1); background: hsla(45, 55%, 55%, 0.08); }
.depth-2.node-row.active .node-label { color: hsla(45, 72%, 68%, 1); }

.depth-3 .node-label { color: hsla(280, 72%, 68%, 0.92); }
.depth-3.node-row { border-left-color: hsla(280, 72%, 68%, 0.3); }
.depth-3.node-row:hover, .depth-3.node-row.active { border-left-color: hsla(280, 72%, 68%, 1); background: hsla(280, 55%, 55%, 0.08); }
.depth-3.node-row.active .node-label { color: hsla(280, 72%, 68%, 1); }

.depth-4 .node-label { color: hsla(20, 72%, 68%, 0.92); }
.depth-4.node-row { border-left-color: hsla(20, 72%, 68%, 0.3); }
.depth-4.node-row:hover, .depth-4.node-row.active { border-left-color: hsla(20, 72%, 68%, 1); background: hsla(20, 55%, 55%, 0.08); }
.depth-4.node-row.active .node-label { color: hsla(20, 72%, 68%, 1); }

.depth-5 .node-label { color: hsla(320, 72%, 68%, 0.92); }
.depth-5.node-row { border-left-color: hsla(320, 72%, 68%, 0.3); }
.depth-5.node-row:hover, .depth-5.node-row.active { border-left-color: hsla(320, 72%, 68%, 1); background: hsla(320, 55%, 55%, 0.08); }
.depth-5.node-row.active .node-label { color: hsla(320, 72%, 68%, 1); }

/* ── CONTENT PANEL ── */
.content-panel {
  overflow-y: auto;
  padding: 24px 28px;
  background: var(--bg);
}
.content-panel::-webkit-scrollbar { width: 3px; }
.content-panel::-webkit-scrollbar-track { background: transparent; }
.content-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── BREADCRUMB ── */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.bc-seg {
  font-family: var(--font-body);
  font-size: 12px;
  color: var(--text-dim);
}
.bc-seg.active { color: var(--text-mid); }
.bc-arrow { color: var(--text-dim); font-size: 10px; }

/* ── LOCATION HEADER ── */
.loc-header {
  margin-bottom: 24px;
}
.loc-title {
  font-family: var(--font-body);
  font-size: 28px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.2;
}
.loc-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  display: flex;
  gap: 16px;
}
.loc-meta span { display: flex; align-items: center; gap: 4px; }

/* ── SUBLOCATIONS ── */
.subloc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
  margin-bottom: 28px;
}
.subloc-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.15s;
  border-left: 3px solid transparent;
}
.subloc-card:hover {
  background: var(--raised);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.subloc-card-name {
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 4px;
}
.subloc-card-count {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
}

/* ── ITEMS ── */
.items-section-label {
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.item-list { display: flex; flex-direction: column; gap: 2px; }

.item-row {
  display: grid;
  grid-template-columns: 1fr auto auto auto;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  transition: all 0.12s;
  cursor: default;
}
.item-row:hover { background: var(--raised); border-color: var(--border2); }

.item-name {
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 400;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.item-sub {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-top: 2px;
}
.item-loc {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-dim);
}
.item-notes {
  font-family: var(--font-body);
  font-size: 10px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 200px;
}

.item-cat {
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
}

.item-score {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  min-width: 28px;
  text-align: right;
  flex-shrink: 0;
}

.item-qty {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-mid);
  min-width: 24px;
  text-align: right;
  flex-shrink: 0;
}

/* ── EMPTY / LOADING ── */
.state-msg {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 300px;
  gap: 10px;
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 12px;
}
.state-spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--border2);
  border-top-color: var(--rose);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── SEARCH RESULTS ── */
.search-header {
  font-family: var(--font-body);
  font-size: 18px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 6px;
}
.search-sub {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 20px;
}
.item-row .item-search-loc {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-dim);
  margin-top: 2px;
}

/* ── NOTES POPUP ── */
.notes-popup {
  position: fixed;
  z-index: 9999;
  background: var(--raised);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 10px 14px;
  max-width: 300px;
  min-width: 140px;
  font-family: var(--font-body);
  font-size: 12px;
  line-height: 1.6;
  color: var(--text);
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  pointer-events: none;
  word-break: break-word;
  white-space: normal;
  opacity: 0;
  transform: translateX(4px);
  transition: opacity 0.05s ease, transform 0.05s ease;
}
.notes-popup.visible { opacity: 1; transform: translateX(0); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>

const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5wZHRqeGpoZXBhcWhycXR2dWV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MDM1NjYsImV4cCI6MjA5MjQ3OTU2Nn0.7a1y4wBWOJ45Wc7bwJNMJ9L09-QijuG31jWlYANKam8';

// ─── STATE ───────────────────────────────────────────────────────────────────
let inventory = [];
let currentPath = null; // null = all
let expandedNodes = new Set();

// ─── CAT COLORS ──────────────────────────────────────────────────────────────
const CAT_COLORS = {

// ─── DATA HELPERS ─────────────────────────────────────────────────────────────
function stringToPath(str) {
  if(!str||!str.trim()) return [];
  return str.split('>').map(s=>s.trim()).filter(Boolean);
}
function pathToString(path) { return (path||[]).join(' > '); }
function pathStartsWith(path, prefix) {
  if(!prefix||prefix.length===0) return true;
  if(path.length < prefix.length) return false;
  return prefix.every((seg,i) => seg === path[i]);
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

const CUR_YEAR = new Date().getFullYear();
function calcScore(item) {
  const freqMap={'Daily':5,'Weekly':4,'Monthly':3,'Rarely':2,'Never':1};
  const critMap={'Essential':5,'Important':4,'Nice to Have':2,'Redundant':1};
  const replMap={'Irreplaceable':5,'Hard/Expensive':4,'Moderate':3,'Easy/Cheap':1};
  const condMult={'New':1.0,'Good':0.95,'Fair':0.80,'Poor':0.60};
  const f=freqMap[item.frequency]||3,c=critMap[item.criticality]||3,r=replMap[item.replaceability]||3,m=condMult[item.condition]||0.9;
  let score=Math.round(((f*0.25)+(c*0.40)+(r*0.35))/5*100*m);
  if(item.lastUsed){const[mu,yu]=item.lastUsed.split('/');const mo=(CUR_YEAR-parseInt(yu))*12+(new Date().getMonth()+1-parseInt(mu));if(mo<=6)score+=5;else if(mo<=24)score-=5;else score-=10;}
  if(item.yearPurchased){const age=CUR_YEAR-parseInt(item.yearPurchased);if(age>=10&&item.criticality!=='Essential')score-=5;}
  if(['Sell','Donate','Trash'].includes(item.keep))score=Math.min(score,20);
  return Math.max(0,Math.min(100,score));
}
function scoreColor(s){return s>=80?'var(--score-green)':s>=50?'var(--score-yellow)':s>=20?'var(--score-orange)':'var(--score-red)';}

function rowToItem(row) {
  const item = {
    id: row.id,
    name: row.name || '',
    sn: row.sn,
    category: row.category || 'Misc',
    docType: row.doc_type,
    digitalCopy: row.digital_copy,
    fillLevel: row.fill_level,
    qty: row.qty,
    frequency: row.frequency,
    criticality: row.criticality,
    replaceability: row.replaceability,
    condition: row.condition,
    keep: row.keep,
    yearPurchased: row.year_purchased,
    lastUsed: row.last_used,
    estValue: row.est_value,
    notes: row.notes,
    misplaced: row.misplaced,
  };
  // Parse location
  const loc = row.location || '';
  item.locationPath = stringToPath(loc);
  return item;
}

// ─── TREE BUILDER ─────────────────────────────────────────────────────────────
function buildTree() {
  const root = { children: {}, total: 0 };
  inventory.forEach(item => {
    const path = item.locationPath || [];
    let node = root;
    path.forEach(seg => {
      if(!node.children[seg]) node.children[seg] = { children: {}, total: 0 };
      node.children[seg].total++;
      node = node.children[seg];
    });
    root.total++;
  });
  return root;
}

// ─── RENDER TREE ──────────────────────────────────────────────────────────────
function renderTree() {
  const tree = buildTree();
  document.getElementById('tree-all-count').textContent = tree.total;
  const container = document.getElementById('tree-root');
  container.innerHTML = '';

  function renderNode(children, parentPath, container, depth) {
    Object.entries(children)
      .sort((a,b) => b[1].total - a[1].total)
      .forEach(([name, node]) => {
        const path = [...parentPath, name];
        const pk = path.join('::');
        const hasChildren = Object.keys(node.children).length > 0;
        const isExpanded = expandedNodes.has(pk);
        const isActive = currentPath && currentPath.join('::') === pk;
        const d = Math.min(depth, 5);

        const wrap = document.createElement('div');
        wrap.className = 'node-wrap';

        const row = document.createElement('div');
        row.className = `node-row depth-${d}${isActive ? ' active' : ''}`;
        row.style.paddingLeft = (depth * 0) + 'px'; // indentation handled by border-left nesting

        const expandBtn = document.createElement('div');
        expandBtn.className = `node-expand${hasChildren ? (isExpanded ? ' open' : '') : ' leaf'}`;
        expandBtn.textContent = hasChildren ? '▶' : '';
        expandBtn.onclick = e => {
          e.stopPropagation();
          if(!hasChildren) return;
          if(isExpanded) expandedNodes.delete(pk);
          else expandedNodes.add(pk);
          renderTree();
        };

        const label = document.createElement('div');
        label.className = 'node-label';
        label.textContent = name;

        const count = document.createElement('div');
        count.className = 'node-count';
        count.textContent = node.total;

        row.appendChild(expandBtn);
        row.appendChild(label);
        row.appendChild(count);
        row.onclick = () => selectPath(path, row);
        wrap.appendChild(row);

        if(hasChildren && isExpanded) {
          const childContainer = document.createElement('div');
          childContainer.className = 'node-children open';
          renderNode(node.children, path, childContainer, depth + 1);
          wrap.appendChild(childContainer);
        }

        container.appendChild(wrap);
      });
  }

  renderNode(tree.children, [], container, 0);

  // Sync active state on tree-all
  document.getElementById('tree-all').classList.toggle('active', currentPath === null);
}

// ─── SELECTION ────────────────────────────────────────────────────────────────
function selectAll() {
  currentPath = null;
  searchQuery = '';
  document.getElementById('search-input').value = '';
  renderTree();
  renderContent();
}

function selectPath(path) {
  currentPath = path;
  searchQuery = '';
  document.getElementById('search-input').value = '';
  // Auto-expand the path
  for(let i = 1; i <= path.length; i++) {
    expandedNodes.add(path.slice(0, i).join('::'));
  }
  renderTree();
  renderContent();
}

// ─── RENDER CONTENT ──────────────────────────────────────────────────────────
function renderContent() {
  const panel = document.getElementById('content-panel');

  // Search mode
  if(searchQuery) {
    const q = searchQuery.toLowerCase();
    const results = inventory.filter(i =>
      i.name.toLowerCase().includes(q) ||
      (i.notes||'').toLowerCase().includes(q) ||
      (i.category||'').toLowerCase().includes(q) ||
      pathToString(i.locationPath).toLowerCase().includes(q) ||
      (i.sn||'').toLowerCase().includes(q)
    );
    panel.innerHTML = `
      <div class="search-header">Search results</div>
      <div class="search-sub">${results.length} item${results.length!==1?'s':''} matching "${esc(searchQuery)}"</div>
      <div class="item-list">${results.map(item => renderItemRow(item, true)).join('')}</div>
    `;
    return;
  }

  // Location mode
  const path = currentPath || [];
  const title = path.length ? path[path.length-1] : 'All Items';
  const items = inventory.filter(i => pathStartsWith(i.locationPath||[], path));

  // Find direct children at this level
  const childMap = {};
  items.forEach(item => {
    const p = item.locationPath || [];
    if(p.length > path.length) {
      const childName = p[path.length];
      if(!childMap[childName]) childMap[childName] = 0;
      childMap[childName]++;
    }
  });
  const directItems = items.filter(i => (i.locationPath||[]).length === path.length);
  const childEntries = Object.entries(childMap).sort((a,b)=>b[1]-a[1]);
  const depth = Math.min(path.length, 5);

  // Breadcrumb
  const bcParts = ['All', ...path].map((seg, i) => {
    if(i === 0) return `<span class="bc-seg ${path.length===0?'active':''}" style="cursor:pointer" onclick="selectAll()">${seg}</span>`;
    const p = path.slice(0, i);
    return `<span class="bc-arrow">›</span><span class="bc-seg ${i===path.length?'active':''}" style="cursor:pointer" onclick="selectPath(${JSON.stringify(p.concat(seg))})">${esc(seg)}</span>`;
  }).join('');

  // Depth color for title
  const depthHues = [200,160,45,280,20,320];
  const hue = depthHues[depth % depthHues.length];
  const titleColor = `hsla(${hue}, 72%, 68%, 1)`;

  let html = `
    <div class="breadcrumb">${bcParts}</div>
    <div class="loc-header">
      <div class="loc-title" style="color:${path.length ? titleColor : 'var(--text)'}">${esc(title)}</div>
      <div class="loc-meta">
        <span>${items.length} item${items.length!==1?'s':''}</span>
        ${childEntries.length ? `<span>${childEntries.length} sublocation${childEntries.length!==1?'s':''}</span>` : ''}
        ${items.length ? `<span>avg score ${Math.round(items.map(calcScore).reduce((a,b)=>a+b,0)/items.length)}</span>` : ''}
      </div>
    </div>
  `;

  // Sublocations grid
  if(childEntries.length) {
    const childDepth = Math.min(depth + 1, 5);
    const childHues = [200,160,45,280,20,320];
    const childHue = childHues[childDepth % childHues.length];
    const childColor = `hsla(${childHue}, 72%, 68%, 1)`;
    const childBorder = `hsla(${childHue}, 72%, 68%, 0.4)`;
    html += `<div class="subloc-grid">` + childEntries.map(([name, count]) => {
      const childPath = [...path, name];
      return `<div class="subloc-card" style="border-left-color:${childBorder}" onclick="selectPath(${JSON.stringify(childPath)})">
        <div class="subloc-card-name" style="color:${childColor}">${esc(name)}</div>
        <div class="subloc-card-count">${count} item${count!==1?'s':''}</div>
      </div>`;
    }).join('') + `</div>`;
  }

  // Direct items at this location
  if(directItems.length) {
    html += `<div class="items-section-label">${path.length ? 'Items here' : 'All items'} &nbsp;·&nbsp; ${directItems.length}</div>`;
    html += `<div class="item-list">${directItems.map(i => renderItemRow(i, false)).join('')}</div>`;
  } else if(!childEntries.length) {
    html += `<div class="state-msg"><span>No items here</span></div>`;
  }

  panel.innerHTML = html;
}

function renderItemRow(item, showLoc) {
  const score = calcScore(item);
  const sc = scoreColor(score);
  const cat = CAT_COLORS[item.category] || CAT_COLORS['Misc'];
  const qty = item.qty && item.qty !== '1' ? `×${item.qty}` : '';
  const notesAttr = item.notes ? `data-note="${esc(item.notes)}"` : '';

  return `<div class="item-row" ${notesAttr}>
    <div>
      <div class="item-name">${esc(item.name)}</div>
      <div class="item-sub">
        ${showLoc ? `<span class="item-loc">${esc(pathToString(item.locationPath))}</span>` : ''}
        ${item.notes ? `<span class="item-notes">${esc(item.notes)}</span>` : ''}
      </div>
    </div>
    <span class="item-cat" style="background:${cat.bg};color:${cat.color}">${esc(item.category||'Misc')}</span>
    ${qty ? `<span class="item-qty">${esc(qty)}</span>` : '<span></span>'}
    <span class="item-score" style="color:${sc}">${score}</span>
  </div>`;
}

// ─── NOTES POPUP ─────────────────────────────────────────────────────────────
(function(){
  const popup = document.getElementById('notes-popup');
  if(!popup) return;
  let hideTimer = null;

  document.addEventListener('mouseover', e => {
    const row = e.target.closest('.item-row[data-note]');
    if(!row) return;
    const text = row.dataset.note;
    if(!text) return;
    clearTimeout(hideTimer);
    popup.textContent = text;
    positionPopup(e);
    popup.classList.add('visible');
  });
  document.addEventListener('mousemove', e => {
    if(popup.classList.contains('visible') && e.target.closest('.item-row[data-note]')) positionPopup(e);
  });
  document.addEventListener('mouseout', e => {
    if(e.target.closest('.item-row[data-note]')) hideTimer = setTimeout(() => popup.classList.remove('visible'), 60);
  });
  function positionPopup(e) {
    const pw = 300;
    let x = e.clientX - pw - 14;
    let y = e.clientY - 16;
    if(x < 8) x = e.clientX + 14;
    if(y + 100 > window.innerHeight - 8) y = window.innerHeight - 108;
    if(y < 8) y = 8;
    popup.style.left = x + 'px';
    popup.style.top = y + 'px';
  }
})();

// ─── SEARCH ───────────────────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  currentPath = searchQuery ? currentPath : null;
  renderTree();
  renderContent();
});

// ─── LOAD DATA ────────────────────────────────────────────────────────────────
async function load() {
  setSyncStatus('loading');
  try {
    let all = [], from = 0, pageSize = 1000;
    while(true) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/inventory?select=*&order=name.asc&offset=${from}&limit=${pageSize}`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Range': `${from}-${from+pageSize-1}`,
        }
      });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const rows = await res.json();
      all = all.concat(rows.map(rowToItem));
      if(rows.length < pageSize) break;
      from += pageSize;
    }
    inventory = all;
    setSyncStatus('ok');
    renderTree();
    renderContent();
  } catch(err) {
    setSyncStatus('error');
    document.getElementById('content-panel').innerHTML = `<div class="state-msg"><span>Failed to load: ${esc(err.message)}</span></div>`;
  }
}

function setSyncStatus(s) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  dot.className = s === 'ok' ? 'ok' : s === 'loading' ? 'loading' : '';
  label.textContent = s === 'ok' ? `${inventory.length} items` : s === 'loading' ? 'loading…' : 'error';
}

load();
</script>
